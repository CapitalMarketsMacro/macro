<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="stack" style="gap:16px">
    <!-- Primary lockup on dark -->
    <div style="background:#0b0d12;border:1px solid #2a2f39;border-radius:8px;padding:18px 20px;display:flex;align-items:center;gap:14px">
      <img src="../assets/logo-mark.svg" width="40" height="40" alt="">
      <div style="display:flex;flex-direction:column;line-height:1.1">
        <div style="font-family:var(--font-sans);font-size:22px;font-weight:600;letter-spacing:-0.01em;color:#e6e8ec">Macro</div>
        <div style="font-family:var(--font-sans);font-size:11px;font-weight:500;letter-spacing:0.14em;color:#2aa6e6;margin-top:3px">RATES · E-TRADING</div>
      </div>
      <div class="label" style="margin-left:auto">Primary · dark</div>
    </div>
    <!-- Secondary combinations -->
    <div class="row" style="gap:10px">
      <div style="flex:1;background:#0b0d12;border:1px solid #2a2f39;border-radius:5px;padding:10px 12px;display:flex;align-items:center;gap:8px">
        <img src="../assets/logo-mark.svg" width="22" height="22" alt="">
        <span style="font-size:14px;font-weight:600;color:#e6e8ec">Macro</span>
        <span style="font-size:10px;letter-spacing:.1em;color:#6f7687;margin-left:auto">RATES</span>
      </div>
      <div style="flex:1;background:#ffffff;border:1px solid #e1e4ea;border-radius:5px;padding:10px 12px;display:flex;align-items:center;gap:8px">
        <img src="../assets/favicon.svg" width="22" height="22" alt="" style="border-radius:3px">
        <span style="font-size:14px;font-weight:600;color:#12141a">Macro</span>
        <span style="font-size:10px;letter-spacing:.1em;color:#7b8392;margin-left:auto">RATES</span>
      </div>
      <div style="width:48px;height:48px;background:#12141a;border:1px solid #2a2f39;border-radius:8px;display:flex;align-items:center;justify-content:center">
        <img src="../assets/favicon.svg" width="28" height="28" alt="">
      </div>
    </div>
    <div style="font-size:11px;color:var(--fg-3);max-width:560px">
      Three candles (cerulean · green · red) + neutral tick. Pair with the product descriptor <span class="mono">RATES · E-TRADING</span> (11px, ALL CAPS, 0.14em tracking) in cerulean on dark, slate on light. Never recolor the candles.
    </div>
  </div>
</div></body></html>
