<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">

    <div class="label">Brand · Macro cerulean</div>

      <div class="swatch dark-fg" style="background:#e7f4fd;color:#0a476c">50</div>
      <div class="swatch dark-fg" style="background:#c2e4fb;color:#0a476c">100</div>
      <div class="swatch dark-fg" style="background:#8ecdf6;color:#0a476c">200</div>

      <div class="swatch" style="background:#0f6497">600</div>

      <button style="background:#2aa6e6;color:#041a26;border:0;padding:6px 14px;border-radius:5px;font:500 13px/1 Inter">Primary action</button>
