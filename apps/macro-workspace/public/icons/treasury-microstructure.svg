    fill="none" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M10,38 Q18,28 26,38 Q34,48 42,38 Q50,28 56,38"
    fill="none" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Spread markers -->
  <line x1="26" y1="28" x2="26" y2="38" stroke="#00d4aa" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
  <line x1="42" y1="28" x2="42" y2="38" stroke="#00d4aa" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
</svg>
