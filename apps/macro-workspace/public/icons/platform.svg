<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#10141e"/>
  <!-- Hub: central diamond with 4 connecting nodes -->
  <g fill="none" stroke="#00d4aa" stroke-width="2">
    <line x1="32" y1="20" x2="20" y2="32"/>
    <line x1="32" y1="20" x2="44" y2="32"/>
    <line x1="32" y1="44" x2="20" y2="32"/>
    <line x1="32" y1="44" x2="44" y2="32"/>
    <line x1="32" y1="20" x2="32" y2="12"/>
    <line x1="32" y1="44" x2="32" y2="52"/>
    <line x1="20" y1="32" x2="12" y2="32"/>
    <line x1="44" y1="32" x2="52" y2="32"/>
  </g>
  <g fill="#00d4aa">
    <rect x="27" y="27" width="10" height="10" rx="2" transform="rotate(45 32 32)"/>
    <circle cx="32" cy="12" r="3"/>
    <circle cx="32" cy="52" r="3"/>
    <circle cx="12" cy="32" r="3"/>
    <circle cx="52" cy="32" r="3"/>
  </g>
</svg>
