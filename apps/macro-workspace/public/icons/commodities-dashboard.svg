<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#10141e"/>
  <!-- Bar chart with varying heights -->
  <g fill="#f59e0b">
    <rect x="12" y="32" width="7" height="18" rx="1.5"/>
    <rect x="22" y="20" width="7" height="30" rx="1.5"/>
    <rect x="32" y="26" width="7" height="24" rx="1.5"/>
    <rect x="42" y="14" width="7" height="36" rx="1.5"/>
  </g>
  <!-- Baseline -->
  <line x1="10" y1="50" x2="51" y2="50" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <!-- Small diamond accent -->
  <rect x="51" y="11" width="5" height="5" rx="1" transform="rotate(45 53.5 13.5)" fill="#f59e0b" opacity="0.6"/>
</svg>
