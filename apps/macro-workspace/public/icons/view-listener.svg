<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Sensor/receiver: satellite dish with incoming waves -->
  <g stroke="#8b5cf6" fill="none" stroke-width="2" stroke-linecap="round">
    <!-- Dish base -->
    <path d="M20,44 Q32,30 44,44"/>
    <line x1="32" y1="37" x2="32" y2="52"/>
    <line x1="26" y1="52" x2="38" y2="52"/>
    <!-- Incoming signal waves (from top-right) -->
    <path d="M44,16 A4,4 0 0,0 48,20" stroke-width="2"/>
    <path d="M40,12 A8,8 0 0,0 52,24" stroke-width="2" opacity="0.6"/>
    <path d="M36,8 A12,12 0 0,0 56,28" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- Focal point -->
  <circle cx="32" cy="37" r="3" fill="#8b5cf6"/>
  <!-- Signal line to dish -->
  <line x1="32" y1="37" x2="44" y2="16" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
</svg>
