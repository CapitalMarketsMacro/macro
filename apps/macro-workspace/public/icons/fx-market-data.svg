<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Currency exchange: two curved arrows forming a cycle -->
  <g fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round">
    <path d="M22,26 A12,12 0 0,1 42,26"/>
    <path d="M42,38 A12,12 0 0,1 22,38"/>
  </g>
  <!-- Arrow heads -->
  <polygon points="42,22 42,30 47,26" fill="#3b82f6"/>
  <polygon points="22,34 22,42 17,38" fill="#3b82f6"/>
  <!-- Currency symbols -->
  <text x="25" y="22" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#3b82f6">$</text>
  <text x="36" y="48" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#3b82f6">€</text>
</svg>
