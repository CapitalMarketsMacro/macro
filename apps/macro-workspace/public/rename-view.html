<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    padding: 16px;
    background: #fff;
    color: #111;
  }
  body.dark {
    background: #1e2028;
    color: #e0e0e0;
  }
  label {
    display: block;
    font-size: 12px;
    margin-bottom: 8px;
    opacity: 0.7;
  }
  input {
    width: 100%;
    padding: 8px;
    border: 1px solid #888;
    border-radius: 4px;
    font-size: 14px;
    background: transparent;
    color: inherit;
    outline: none;
  }
  input:focus { border-color: #3b82f6; }
  .buttons {
    margin-top: 12px;
    text-align: right;
  }
  button {
    padding: 6px 16px;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }
  .ok { background: #3b82f6; color: white; }
  .ok:hover { background: #2563eb; }
  .cancel { background: #666; color: white; margin-left: 8px; }
  .cancel:hover { background: #555; }
</style>
</head>
<body>
  <label>View Name</label>
  <input id="nameInput" type="text" autofocus />
  <div class="buttons">
    <button class="ok" id="okBtn">OK</button>
    <button class="cancel" id="cancelBtn">Cancel</button>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const input = document.getElementById('nameInput');
    const currentTitle = params.get('title') || '';
    const isDark = params.get('dark') === '1';

    if (isDark) document.body.classList.add('dark');
    input.value = currentTitle;
    input.select();

    function submit() {
      const val = input.value.trim();
      if (val) fin.me.dispatchPopupResult(val);
      else fin.me.dispatchPopupResult(null);
    }

    document.getElementById('okBtn').addEventListener('click', submit);
    document.getElementById('cancelBtn').addEventListener('click', () => fin.me.dispatchPopupResult(null));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submit();
      if (e.key === 'Escape') fin.me.dispatchPopupResult(null);
    });
  </script>
</body>
</html>
