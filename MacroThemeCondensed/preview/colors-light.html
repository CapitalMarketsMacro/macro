<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body class="theme-light" style="background:#eceef2"><div class="card">
  <div class="stack" style="gap:10px">
    <div class="label" style="color:#7b8392">Light theme · inverted surfaces + darkened directionals</div>
    <div class="grid" style="grid-template-columns:repeat(4,1fr);gap:6px">
      <div class="swatch" style="background:#eceef2;color:#12141a">app</div>
      <div class="swatch" style="background:#ffffff;color:#12141a;border:1px solid #e1e4ea">canvas</div>
      <div class="swatch" style="background:#f6f7f9;color:#12141a;border:1px solid #e1e4ea">panel</div>

    </div>
    <div class="row" style="gap:10px;margin-top:10px;font-family:var(--font-mono);font-size:13px">
      <span style="background:rgba(16,168,92,0.12);color:#0f7f45;padding:3px 6px;border-radius:3px">▲ 99.42</span>
      <span style="background:rgba(232,64,56,0.12);color:#b82c25;padding:3px 6px;border-radius:3px">▼ 98.18</span>
      <span style="color:#3b414c">mid 98.80</span>

    </div>
  </div>
