<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Macro · Analytics</title>
<link rel="icon" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../_shared/chrome.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../_shared/chrome.jsx"></script>
<script type="text/babel">
const { useState, useMemo } = React;
const { Icon, TitleBar, TopNav, StatusBar, Panel } = Chrome;

// Yield curve data (tenor years -> rate)
const CURVE_USD = [[0.25,5.38],[0.5,5.21],[1,4.78],[2,4.18],[3,4.12],[5,4.11],[7,4.19],[10,4.24],[15,4.31],[20,4.38],[30,4.45]];
const CURVE_EUR = [[0.25,3.72],[0.5,3.45],[1,2.98],[2,2.42],[3,2.31],[5,2.18],[7,2.24],[10,2.34],[15,2.41],[20,2.46],[30,2.52]];
const CURVE_GBP = [[0.25,5.18],[0.5,4.92],[1,4.56],[2,4.21],[3,4.11],[5,4.02],[7,4.10],[10,4.51],[15,4.58],[20,4.62],[30,4.68]];

function YieldCurve() {
  const w=760, h=360, pad={l:48,r:16,t:20,b:32};
  const xs = CURVE_USD.map(p=>p[0]);
  const ys = [...CURVE_USD,...CURVE_EUR,...CURVE_GBP].map(p=>p[1]);
  const xMax = Math.max(...xs), yMin = 1.8, yMax = 5.6;
  const sx = t => pad.l + (t/xMax)*(w-pad.l-pad.r);
  const sy = r => pad.t + (1-(r-yMin)/(yMax-yMin))*(h-pad.t-pad.b);
  const path = (data) => data.map((p,i)=>(i?'L':'M')+sx(p[0])+' '+sy(p[1])).join(' ');
  const tenorLabels = [0.25,1,2,5,10,30];
  return (
    <svg width={w} height={h} style={{background:'var(--bg-canvas)',display:'block'}}>
      {/* horizontal grid */}
      {[2,3,4,5].map(v=>(
        <g key={v}>
          <line x1={pad.l} x2={w-pad.r} y1={sy(v)} y2={sy(v)} stroke="var(--border-grid)" strokeWidth="1"/>
          <text x={pad.l-8} y={sy(v)+3} fill="var(--fg-3)" fontSize="10" textAnchor="end" fontFamily="var(--font-mono)">{v.toFixed(2)}</text>
        </g>
      ))}
      {/* tenor ticks */}
      {tenorLabels.map(t=>(
        <text key={t} x={sx(t)} y={h-pad.b+14} fill="var(--fg-3)" fontSize="10" textAnchor="middle" fontFamily="var(--font-mono)">{t<1?t*12+'M':t+'Y'}</text>
      ))}
      {/* curves */}
      <path d={path(CURVE_USD)} fill="none" stroke="#e89f22" strokeWidth="1.5"/>
      <path d={path(CURVE_EUR)} fill="none" stroke="#5b8def" strokeWidth="1.5"/>
      <path d={path(CURVE_GBP)} fill="none" stroke="#a88cf2" strokeWidth="1.5"/>
      {CURVE_USD.map((p,i)=><circle key={i} cx={sx(p[0])} cy={sy(p[1])} r="2.5" fill="#e89f22"/>)}
      {/* crosshair highlight at 10Y */}
      <line x1={sx(10)} x2={sx(10)} y1={pad.t} y2={h-pad.b} stroke="var(--border-3)" strokeDasharray="2 3"/>
      <circle cx={sx(10)} cy={sy(4.24)} r="4" fill="none" stroke="#e89f22" strokeWidth="1.5"/>
      <text x={sx(10)+8} y={sy(4.24)-8} fill="#e89f22" fontSize="11" fontFamily="var(--font-mono)" fontWeight="500">USD 10Y · 4.2385</text>
      {/* legend */}
      <g transform={`translate(${pad.l+8},${pad.t+8})`} fontFamily="var(--font-mono)" fontSize="11">
        <rect x="-4" y="-2" width="140" height="60" fill="var(--bg-panel)" stroke="var(--border-1)" rx="3"/>
        <circle cx="6" cy="10" r="3" fill="#e89f22"/><text x="14" y="14" fill="var(--fg-1)">USD SOFR</text>
        <circle cx="6" cy="28" r="3" fill="#5b8def"/><text x="14" y="32" fill="var(--fg-1)">EUR ESTR</text>
        <circle cx="6" cy="46" r="3" fill="#a88cf2"/><text x="14" y="50" fill="var(--fg-1)">GBP SONIA</text>
      </g>
    </svg>
  );
}

function PriceHistory() {
  const w=500, h=180, pad={l:32,r:8,t:12,b:20};
  const pts = useMemo(()=>{ const a=[]; let v=4.22; for(let i=0;i<120;i++){ v += (Math.random()-0.5)*0.01; a.push(v);} return a; }, []);
  const xMax = pts.length-1;
  const yMin = Math.min(...pts)-.01, yMax = Math.max(...pts)+.01;
  const sx = i => pad.l + (i/xMax)*(w-pad.l-pad.r);
  const sy = v => pad.t + (1-(v-yMin)/(yMax-yMin))*(h-pad.t-pad.b);
  const path = pts.map((v,i)=>(i?'L':'M')+sx(i)+' '+sy(v)).join(' ');
  const last = pts[pts.length-1], first = pts[0], up = last>=first;
  const area = path + ` L ${sx(xMax)} ${h-pad.b} L ${sx(0)} ${h-pad.b} Z`;
  return (
    <svg width={w} height={h} style={{background:'var(--bg-canvas)',display:'block'}}>
      <defs>
        <linearGradient id="g1" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={up?'#34d97a':'#ff6b64'} stopOpacity="0.20"/>
          <stop offset="100%" stopColor={up?'#34d97a':'#ff6b64'} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#g1)"/>
      <path d={path} fill="none" stroke={up?'#34d97a':'#ff6b64'} strokeWidth="1.5"/>
      <text x={pad.l} y={pad.t+8} fill="var(--fg-3)" fontSize="10" fontFamily="var(--font-mono)">USD 10Y · 1D · intraday</text>
      <text x={w-pad.r} y={pad.t+8} textAnchor="end" fill={up?'#34d97a':'#ff6b64'} fontSize="11" fontFamily="var(--font-mono)" fontWeight="500">{last.toFixed(4)}</text>
    </svg>
  );
}

function DepthLadder() {
  const bids = [[4.2370,12],[4.2372,25],[4.2374,44],[4.2376,62],[4.2378,88]];
  const asks = [[4.2392,18],[4.2394,32],[4.2396,50],[4.2398,71],[4.2400,96]];
  const maxSize = Math.max(...bids.map(b=>b[1]),...asks.map(a=>a[1]));
  return (
    <div style={{fontFamily:'var(--font-mono)',fontSize:11}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0,padding:'0 8px',color:'var(--fg-3)',fontSize:10,letterSpacing:'.06em',textTransform:'uppercase',paddingBottom:4,borderBottom:'1px solid var(--border-1)'}}>
        <div>Bid · size</div><div style={{textAlign:'right'}}>Size · Ask</div>
      </div>
      {bids.map(([p,s],i)=>(
        <div key={'b'+i} style={{display:'grid',gridTemplateColumns:'1fr 1fr',padding:'2px 8px',position:'relative',height:22,alignItems:'center'}}>
          <div style={{position:'absolute',left:0,top:0,bottom:0,width:(s/maxSize*50)+'%',background:'rgba(52,217,122,.10)'}}/>
          <div style={{position:'relative',color:'var(--mkt-up)'}}>{p.toFixed(4)} <span className="muted" style={{marginLeft:8}}>{s}</span></div>
          <div style={{textAlign:'right',position:'relative'}}></div>
        </div>
      ))}
      <div style={{padding:'4px 8px',background:'var(--bg-raised)',display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:12,fontWeight:500}}>
        <span>mid 4.2383</span><span className="muted" style={{fontSize:10}}>spread 0.0020</span>
      </div>
      {asks.map(([p,s],i)=>(
        <div key={'a'+i} style={{display:'grid',gridTemplateColumns:'1fr 1fr',padding:'2px 8px',position:'relative',height:22,alignItems:'center'}}>
          <div style={{position:'absolute',right:0,top:0,bottom:0,width:(s/maxSize*50)+'%',background:'rgba(255,107,100,.10)'}}/>
          <div></div>
          <div style={{textAlign:'right',position:'relative',color:'var(--mkt-down)'}}><span className="muted" style={{marginRight:8}}>{s}</span>{p.toFixed(4)}</div>
        </div>
      ))}
    </div>
  );
}

function App() {
  return (
    <div id="root" style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <TitleBar title="Macro · Analytics" />
      <TopNav
        tabs={[{id:'curves',label:'Curves'},{id:'spreads',label:'Spreads'},{id:'vol',label:'Vol surfaces'},{id:'corr',label:'Correlations'}]}
        active="curves"
      />
      <div className="content">
        <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
          <Panel title="Yield curves · USD / EUR / GBP" actions={<>
            <button className="btn btn-xs btn-primary">1D</button>
            <button className="btn btn-xs btn-ghost">1W</button>
            <button className="btn btn-xs btn-ghost">1M</button>
            <button className="btn btn-xs btn-ghost">YTD</button>
          </>}>
            <div style={{padding:8}}><YieldCurve/></div>
          </Panel>
          <div className="splitter-h"/>
          <Panel title="Price history · USD 10Y SOFR">
            <div style={{padding:8,display:'flex',gap:8,flexWrap:'wrap'}}>
              <PriceHistory/>
              <div style={{flex:1,minWidth:240,display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,padding:'12px 8px'}}>
                {[['High','4.2402'],['Low','4.2168'],['Open','4.2240'],['Close·prev','4.2342'],['DV01','$9,450/MM'],['Vol 1D','0.52%']].map(([l,v])=>(
                  <div key={l}><div className="label">{l}</div><div className="mono" style={{fontSize:16,fontWeight:500,marginTop:2}}>{v}</div></div>
                ))}
              </div>
            </div>
          </Panel>
        </div>
        <div style={{width:260,flex:'0 0 auto'}}>
          <Panel title="Depth · 10Y SOFR">
            <DepthLadder/>
          </Panel>
        </div>
      </div>
      <StatusBar items={['data: realtime','models: MACRO-CURVE-v12']} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
