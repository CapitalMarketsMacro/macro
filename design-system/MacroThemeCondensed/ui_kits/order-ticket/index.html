<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Macro · Order Ticket</title>
<link rel="icon" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../_shared/chrome.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  .ticket { width: 420px; background: var(--bg-raised); border-radius: 8px; border: 1px solid var(--border-2); box-shadow: 0 12px 32px rgba(0,0,0,0.55); }
  .ticket-head { padding: 12px 16px; border-bottom: 1px solid var(--border-1); display:flex;justify-content:space-between;align-items:center }
  .ticket-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .field-row { display: grid; grid-template-columns: 88px 1fr; align-items: center; gap: 8px; }
  .field-row label { font-size: 11px; color: var(--fg-3); }
  .field-row input, .field-row select { width: 100%; }
  .big-num { font-family: var(--font-mono); font-size: 32px; font-weight: 500; letter-spacing: -0.01em; }
  .quote-card { background: var(--bg-panel); border: 1px solid var(--border-1); border-radius: 5px; padding: 10px 12px; }
  .rfq-row { display: grid; grid-template-columns: 100px 1fr 80px 80px 60px; gap: 10px; padding: 6px 0; align-items: center; font-size: 11px; border-bottom: 1px solid var(--border-grid); }
  .rfq-row:last-child { border-bottom: 0; }
  .dot-live { width: 6px; height: 6px; border-radius: 999px; background: var(--mkt-up); animation: pulse 1.2s ease-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../_shared/chrome.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const { Icon, TitleBar, TopNav, StatusBar, Panel } = Chrome;

function OrderTicket() {
  const [side, setSide] = useState('Buy');
  const [mode, setMode] = useState('Limit');
  const [price, setPrice] = useState('4.2385');
  return (
    <div className="ticket">
      <div className="ticket-head">
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{fontSize:14,fontWeight:600}}>New order</div>
          <span className="tag">IRS</span>
        </div>
        <div className="muted mono" style={{fontSize:11}}>USD 10Y SOFR · esc</div>
      </div>
      <div className="ticket-body">
        <div style={{display:'flex',gap:6}}>
          <button className={'btn '+(side==='Buy'?'btn-bid':'btn-ghost')} style={{flex:1,padding:'10px 0',justifyContent:'center',fontSize:13}} onClick={()=>setSide('Buy')}>Buy</button>
          <button className={'btn '+(side==='Sell'?'btn-ask':'btn-ghost')} style={{flex:1,padding:'10px 0',justifyContent:'center',fontSize:13}} onClick={()=>setSide('Sell')}>Sell</button>
        </div>
        <div style={{display:'flex',gap:0,borderRadius:5,border:'1px solid var(--border-2)',overflow:'hidden',fontSize:11}}>
          {['Limit','Market','Iceberg','TWAP'].map(m=>(
            <button key={m} className="btn" style={{flex:1,border:0,borderRadius:0,background:mode===m?'var(--bg-panel)':'transparent',color:mode===m?'var(--fg-1)':'var(--fg-3)'}} onClick={()=>setMode(m)}>{m}</button>
          ))}
        </div>
        <div className="field-row"><label>Size</label><input className="num" defaultValue="25,000,000"/></div>
        <div className="field-row"><label>Price</label><input className="num" value={price} onChange={e=>setPrice(e.target.value)}/></div>
        <div className="field-row"><label>TIF</label><select><option>Day</option><option>IOC</option><option>FOK</option><option>GTC</option></select></div>
        <div className="field-row"><label>Venue</label><select><option>TradeWeb</option><option>Bloomberg</option><option>MarketAxess</option></select></div>
        <div className="field-row"><label>Account</label><select><option>MACRO-RATES-14</option></select></div>
        <div className="quote-card">
          <div className="label" style={{marginBottom:4}}>Live mid · USD 10Y SOFR</div>
          <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between'}}>
            <div className="big-num">{price}</div>
            <div style={{display:'flex',gap:10,fontSize:11,alignItems:'center'}}>
              <span className="dot-live"/>
              <span className="bid">B 4.2375</span>
              <span className="ask">A 4.2395</span>
            </div>
          </div>
          <div className="muted" style={{fontSize:11,marginTop:4}}>spread 0.0020 · DV01 $9,450 per MM</div>
        </div>
        <div style={{display:'flex',gap:8,fontSize:11}}>
          <label style={{display:'flex',gap:6,alignItems:'center',color:'var(--fg-2)'}}><input type="checkbox"/> All-or-none</label>
          <label style={{display:'flex',gap:6,alignItems:'center',color:'var(--fg-2)'}}><input type="checkbox"/> Hide size</label>
          <label style={{display:'flex',gap:6,alignItems:'center',color:'var(--fg-2)'}}><input type="checkbox" defaultChecked/> Pre-trade check</label>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div className="mono muted" style={{fontSize:11}}>⌘⏎ Submit · esc Cancel</div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost">Cancel</button>
            <button className="btn btn-primary">Submit {side.toLowerCase()}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function RFQTicket() {
  const [quotes, setQuotes] = useState([
    { dealer:'JPM', state:'quoted', bid: '4.2372', ask: '4.2396', time: 0.8 },
    { dealer:'GS',  state:'quoted', bid: '4.2374', ask: '4.2394', time: 1.2 },
    { dealer:'DB',  state:'quoted', bid: '4.2370', ask: '4.2400', time: 0.5 },
    { dealer:'BNP', state:'waiting',bid: '—',      ask: '—',      time: 0 },
    { dealer:'HSBC',state:'waiting',bid: '—',      ask: '—',      time: 0 },
    { dealer:'SG',  state:'passed', bid: '—',      ask: '—',      time: 3.4 },
  ]);
  return (
    <div className="ticket" style={{width:520}}>
      <div className="ticket-head">
        <div><div style={{fontSize:14,fontWeight:600}}>RFQ · 6 dealers</div></div>
        <span className="badge badge-live"><span className="dot-live"/>Live · 18s</span>
      </div>
      <div className="ticket-body">
        <div className="quote-card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
            <div><span className="tag">IRS</span> <span style={{fontSize:13,fontWeight:500}}>USD 10Y SOFR</span></div>
            <div className="mono muted" style={{fontSize:11}}>25MM · Buy</div>
          </div>
        </div>
        <div>
          <div className="rfq-row" style={{color:'var(--fg-3)',textTransform:'uppercase',fontSize:10,letterSpacing:'.06em'}}>
            <span>Dealer</span><span>Status</span><span className="num-r" style={{textAlign:'right'}}>Bid</span><span style={{textAlign:'right'}}>Ask</span><span style={{textAlign:'right'}}>t</span>
          </div>
          {quotes.map((q,i)=>(
            <div key={i} className="rfq-row">
              <span style={{fontWeight:500}}>{q.dealer}</span>
              <span>
                {q.state==='quoted' && <span className="badge badge-live"><span className="dot"/>Quoted</span>}
                {q.state==='waiting' && <span className="badge badge-pending"><span className="dot"/>Waiting</span>}
                {q.state==='passed' && <span className="badge badge-cancelled"><span className="dot"/>Pass</span>}
              </span>
              <span className={'mono num-r ' + (q.state==='quoted'?'bid':'muted')} style={{textAlign:'right'}}>{q.bid}</span>
              <span className={'mono ' + (q.state==='quoted'?'ask':'muted')} style={{textAlign:'right'}}>{q.ask}</span>
              <span className="mono muted" style={{textAlign:'right',fontSize:10}}>{q.time?q.time+'s':''}</span>
            </div>
          ))}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div className="mono muted" style={{fontSize:11}}>Best bid <span className="bid">4.2374</span> · best ask <span className="ask">4.2394</span></div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost">Pass all</button>
            <button className="btn btn-bid">Hit 4.2374</button>
            <button className="btn btn-primary">Lift 4.2394</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [active, setActive] = useState('order');
  return (
    <div id="root" style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <TitleBar title="Macro · Order Ticket" />
      <TopNav
        tabs={[{id:'order',label:'Order'},{id:'rfq',label:'RFQ'}]}
        active={active} onTab={setActive}
      />
      <div className="content" style={{background:'var(--bg-app)',justifyContent:'center',alignItems:'flex-start',padding:40,gap:32,overflow:'auto'}}>
        {active==='order' ? <OrderTicket/> : <RFQTicket/>}
        <div style={{maxWidth:320,color:'var(--fg-3)',fontSize:12}}>
          <div className="label" style={{marginBottom:8}}>Notes</div>
          <p style={{marginBottom:8}}>Tickets open as right-side drawers in the main app. Shown here centred for demo. Keyboard-driven: ⌘⏎ submits, esc cancels, ↑↓ step price.</p>
          <p>The <b>Order</b> ticket is for direct-route orders; <b>RFQ</b> for multi-dealer quotes. Middle-office trade capture reuses the same layout.</p>
        </div>
      </div>
      <StatusBar items={['ticket-window', 'credit: OK']} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
