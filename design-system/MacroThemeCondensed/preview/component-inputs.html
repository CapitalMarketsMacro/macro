<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="stack" style="gap:10px">
    <div class="label">Form inputs</div>
    <div class="row" style="gap:12px;flex-wrap:wrap">
      <div class="col" style="gap:3px">
        <div class="label">Size</div>
        <input value="25,000,000" style="background:#12141a;border:1px solid #363c48;color:#e6e8ec;padding:5px 8px;border-radius:3px;font:500 13px/1 'JetBrains Mono';width:140px">
      </div>
      <div class="col" style="gap:3px">
        <div class="label">Price</div>
        <input value="99.42" style="background:#12141a;border:1px solid #2aa6e6;color:#e6e8ec;padding:5px 8px;border-radius:3px;font:500 13px/1 'JetBrains Mono';width:90px;outline:2px solid rgba(42,166,230,.25);outline-offset:1px">
      </div>
      <div class="col" style="gap:3px">
        <div class="label">Tenor</div>
        <select style="background:#12141a;border:1px solid #363c48;color:#e6e8ec;padding:5px 8px;border-radius:3px;font:500 13px/1 Inter;width:90px"><option>10Y</option></select>
      </div>
      <div class="col" style="gap:3px">
        <div class="label">Side</div>
        <div class="row" style="gap:0">
          <button style="background:#08281a;color:#6ee7a8;border:1px solid #0a5c32;padding:5px 14px;font:500 12px/1 Inter;border-radius:3px 0 0 3px;border-right:0">Buy</button>
          <button style="background:transparent;color:#a8afbd;border:1px solid #363c48;padding:5px 14px;font:500 12px/1 Inter;border-radius:0 3px 3px 0">Sell</button>
        </div>
      </div>
    </div>
    <div class="row" style="gap:10px;margin-top:4px;align-items:center">
      <label style="font-size:12px;color:var(--fg-2);display:flex;align-items:center;gap:6px"><input type="checkbox" checked> All-or-none</label>
      <label style="font-size:12px;color:var(--fg-2);display:flex;align-items:center;gap:6px"><input type="checkbox"> IOC</label>
      <span style="background:rgba(255,107,100,0.14);color:#ff9a95;padding:3px 8px;border-radius:3px;font-size:11px">Price outside tolerance</span>
    </div>
  </div>
</div></body></html>
