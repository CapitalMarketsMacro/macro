<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="stack" style="gap:12px">
    <div class="label">Buttons</div>
    <div class="row" style="gap:10px;flex-wrap:wrap">
      <button style="background:#2aa6e6;color:#041a26;border:0;padding:6px 14px;border-radius:5px;font:500 13px/1 Inter;cursor:pointer">Submit order</button>
      <button style="background:transparent;color:#e6e8ec;border:1px solid #363c48;padding:6px 14px;border-radius:5px;font:500 13px/1 Inter;cursor:pointer">Cancel</button>
      <button style="background:transparent;color:#a8afbd;border:0;padding:6px 10px;border-radius:5px;font:500 13px/1 Inter;cursor:pointer">Reset</button>
      <button style="background:#3a0f0c;color:#ff9a95;border:1px solid #861e19;padding:6px 14px;border-radius:5px;font:500 13px/1 Inter;cursor:pointer">Cancel all</button>
    </div>
    <div class="row" style="gap:10px;flex-wrap:wrap">
      <button style="background:#08281a;color:#6ee7a8;border:1px solid #0a5c32;padding:4px 12px;border-radius:5px;font:500 12px/1 Inter;cursor:pointer">Bid</button>
      <button style="background:#3a0f0c;color:#ff9a95;border:1px solid #861e19;padding:4px 12px;border-radius:5px;font:500 12px/1 Inter;cursor:pointer">Ask</button>
      <button style="background:transparent;color:#e6e8ec;border:1px solid #363c48;padding:3px 8px;border-radius:3px;font:500 11px/1 Inter;cursor:pointer">+ New</button>
      <button style="background:#2aa6e6;color:#041a26;border:0;padding:4px 10px;border-radius:3px;font:500 11px/1 Inter;cursor:pointer">Send RFQ</button>
      <button disabled style="background:transparent;color:#4a5060;border:1px solid #2a2f39;padding:6px 14px;border-radius:5px;font:500 13px/1 Inter">Disabled</button>
    </div>
    <div style="font-size:11px;color:var(--fg-3)">Primary = cerulean. Neutral = bordered ghost. Bid/Ask = green/red bordered. Destructive = red tint.</div>
  </div>
</div></body></html>
