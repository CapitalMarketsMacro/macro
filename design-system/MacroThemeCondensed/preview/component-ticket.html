<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="stack" style="gap:10px">
    <div class="label">Ticket · focused input · keyboard hints</div>
    <div style="background:#1e222a;border:1px solid #363c48;border-radius:8px;padding:12px;width:320px;box-shadow:0 4px 12px rgba(0,0,0,.45)">
      <div class="row" style="justify-content:space-between;margin-bottom:8px">
        <div style="font-size:13px;font-weight:600">New RFQ</div>
        <div style="font-family:var(--font-mono);color:#6f7687;font-size:11px">esc</div>
      </div>
      <div style="color:#6f7687;font-family:var(--font-mono);font-size:11px;margin-bottom:10px">USD 10Y SOFR · mid 4.2385</div>
      <div class="row" style="gap:8px;margin-bottom:10px">
        <button style="flex:1;background:#08281a;color:#6ee7a8;border:1px solid #0a5c32;padding:8px 0;border-radius:5px;font:500 13px/1 Inter">Buy</button>
        <button style="flex:1;background:transparent;color:#a8afbd;border:1px solid #363c48;padding:8px 0;border-radius:5px;font:500 13px/1 Inter">Sell</button>
      </div>
      <div class="row" style="gap:8px;margin-bottom:10px">
        <div class="col" style="gap:3px;flex:1">
          <div class="label">Size</div>
          <input value="25MM" style="background:#12141a;border:1px solid #363c48;color:#e6e8ec;padding:6px 8px;border-radius:3px;font:500 13px/1 'JetBrains Mono';width:100%;box-sizing:border-box">
        </div>
        <div class="col" style="gap:3px;flex:1">
          <div class="label">Counterparty</div>
          <input value="3 selected" style="background:#12141a;border:1px solid #2aa6e6;color:#e6e8ec;padding:6px 8px;border-radius:3px;font:500 13px/1 Inter;width:100%;box-sizing:border-box;outline:2px solid rgba(42,166,230,.25);outline-offset:1px">
        </div>
      </div>
      <div class="row" style="justify-content:space-between">
        <div style="color:#6f7687;font-family:var(--font-mono);font-size:11px">⏎ Send · ⌘⏎ Send all</div>
        <button style="background:#2aa6e6;color:#041a26;border:0;padding:6px 14px;border-radius:5px;font:500 13px/1 Inter">Send RFQ</button>
      </div>
    </div>
  </div>
</div></body></html>
