<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="stack" style="gap:10px">
    <div class="label">Semantic status</div>
    <div class="grid" style="grid-template-columns:repeat(2,1fr);gap:6px">
      <div class="swatch dark-fg" style="background:#5b8def;color:#0b0d12">info · #5b8def</div>
      <div class="swatch dark-fg" style="background:#f5c13a;color:#0b0d12">warn · #f5c13a</div>
      <div class="swatch dark-fg" style="background:#ff6b64;color:#0b0d12">error · #ff6b64</div>
      <div class="swatch dark-fg" style="background:#34d97a;color:#0b0d12">ok · #34d97a</div>
    </div>
    <div class="row" style="gap:8px;margin-top:10px;font-size:11px">
      <span style="background:rgba(91,141,239,0.14);color:#8fb5ff;padding:3px 8px;border-radius:999px">● Info</span>
      <span style="background:rgba(245,193,58,0.14);color:#ffd96a;padding:3px 8px;border-radius:999px">● Stale</span>
      <span style="background:rgba(255,107,100,0.14);color:#ff9a95;padding:3px 8px;border-radius:999px">● Halted</span>
      <span style="background:rgba(52,217,122,0.14);color:#6ee7a8;padding:3px 8px;border-radius:999px">● Live</span>
    </div>
    <div style="font-size:11px;color:var(--fg-3)">Green/red used for NON-DIRECTIONAL status only (Live/Halted connection states).</div>
  </div>
</div></body></html>
