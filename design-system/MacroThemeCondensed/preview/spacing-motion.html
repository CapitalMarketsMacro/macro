<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="stack" style="gap:10px">
    <div class="label">Motion · fast, functional, no bounces</div>
    <style>
      @keyframes flashUp { 0%{background:rgba(52,217,122,0.42)} 100%{background:transparent} }
      @keyframes flashDown { 0%{background:rgba(255,107,100,0.42)} 100%{background:transparent} }
      .demo-row { display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:13px;padding:4px 8px;border-radius:3px }
      .up-cell { color:var(--mkt-up); animation: flashUp 600ms linear }
      .down-cell { color:var(--mkt-down); animation: flashDown 600ms linear }
      .tap-btn:active { transform:translateY(1px) }
    </style>
    <div class="demo-row"><span style="color:var(--fg-3);width:80px">USD 10Y</span><span class="up-cell" style="padding:2px 6px" id="c1">4.2385</span><span style="color:var(--fg-3)">▲ +0.0020</span></div>
    <div class="demo-row"><span style="color:var(--fg-3);width:80px">EUR 5Y</span><span class="down-cell" style="padding:2px 6px">2.1840</span><span style="color:var(--fg-3)">▼ −0.0015</span></div>
    <div class="row" style="gap:10px;margin-top:6px">
      <div class="mono" style="font-size:10px;color:var(--fg-3);width:110px">flash · 600ms linear</div>
      <div class="mono" style="font-size:10px;color:var(--fg-3);width:110px">hover · 120ms out</div>
      <div class="mono" style="font-size:10px;color:var(--fg-3);width:110px">modal · 180ms</div>
    </div>
    <div style="font-size:11px;color:var(--fg-3);margin-top:4px">No skeleton shimmer — reads as a ticking price. No bounces, no springs.</div>
  </div>
</div>
<script>
  setInterval(()=>{ const el=document.getElementById('c1'); if(el){ el.style.animation='none'; void el.offsetWidth; el.style.animation='flashUp 600ms linear'; }}, 2200);
</script>
</body></html>
