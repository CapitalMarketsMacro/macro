openapi: 3.1.0

info:
  title: Macro Workspace Storage API
  version: 1.2.0
  contact:
    name: Macro Platform Team
    email: support@macro.example.com
  description: |
    Multi-user, multi-environment persistence service for the OpenFin **macro-workspace**
    platform. It stores everything the desktop platform persists on behalf of a user:

    - **Saved workspaces** — the "List of Workspaces" plus each workspace's full
      golden-layout snapshot (`Workspace` from `@openfin/workspace-platform`).
    - **Saved pages** — the browser "Save Page" documents (`Page` from
      `@openfin/workspace-platform`).
    - **Dock customization** — the user-rearranged dock layout, keyed by dock provider id
      (`DockProviderConfigWithIdentity` from `@openfin/workspace`).
    - **Store favorites** — the ordered list of favorited `appId`s.
    - **Named preferences** — small JSON values under free-form keys (theme preset,
      custom view titles, last-saved-workspace pointer, …).
    - **Platform config** (read-only to the platform) — the per-environment configuration
      documents (`settings`, `apps`, `dock-config`, `storefront-config`, `snap-config`,
      `entitlements`) that today ship as static files under
      `apps/macro-workspace/public/{local,openshift}/`.
    - **LOB dock apps** (read-only to the platform) — custom dock apps published by
      lines of business (`/dock-apps`), **shared across all users** like platform
      config. LOB tooling writes them; the platform reads them at dock init.
    - **LOB store apps** (read-only to the platform) — full storefront apps published
      by lines of business (`/store-apps`), **shared across all users** like platform
      config. LOB tooling writes them; the platform merges them into the app registry
      at load (registry wins on `appId` collisions).

    The canonical TypeScript client is `RestWorkspaceStorageClient` in
    `libs/openfin/src/lib/storage/rest-storage-client.ts`; the client-side contract is
    `WorkspaceStorageClient` in `libs/openfin/src/lib/storage/storage-types.ts`. Servers
    implementing this spec MUST treat `snapshot` (workspaces) and `layout` (pages) as
    **opaque JSON** — the OpenFin client is the schema owner of those documents and their
    shape changes with the Workspace SDK version.

    ## Environment model

    One service deployment exists **per environment** (DEV / UAT / PROD, plus the local
    reference implementation). The environment is selected purely by **base URL** — never
    by a path segment, header, or query parameter. The platform's `settings.json`
    `storage.environments` block maps environment names to base URLs; the active
    environment is resolved at boot (`?storageEnv=` query param → user's saved choice →
    `defaultEnvironment` → `local`).

    ## Authentication and user scoping (interim)

    Every route except `GET /health`, `GET /config/{configName}` and the `/dock-apps`
    and `/store-apps` routes is **user-scoped**: resources belong to exactly one user and requests must
    carry the caller's identity in the `X-User-Id` request header (security scheme
    `userId`). The reference implementation defaults to `anonymous` when the header is
    absent.

    > **Phase 2:** the plain-header scheme is interim and carries no proof of identity.
    > Phase 2 replaces it with a real identity token — OAuth 2.0 / OIDC bearer JWT
    > (`Authorization: Bearer <jwt>`), with the user id taken from the token's `sub`
    > claim and `X-User-Id` ignored (or validated against the token, then removed). The
    > wire contract of every route is otherwise unchanged, so clients only swap the
    > header they attach.

    `GET /config/{configName}` is **not** user-scoped: platform config is
    per-environment, identical for every user of that deployment.
    `PUT /config/{configName}` is a phase-2 admin operation (the reference
    implementation returns `501 Not Implemented`).

    The `/dock-apps` and `/store-apps` routes are likewise **not** user-scoped: LOB
    dock apps and LOB store apps are shared across all users of the deployment.
    `X-User-Id` is not required on them and is ignored when sent. The reference
    implementation persists both in the **same store file** as user data, at the top
    level (not under any user) — dock apps under a `dockApps` key, store apps under a
    `storeApps` key (older store files without these keys load fine) — with the same
    debounced file persistence.

    ## Concurrency (ETag / If-Match)

    Single-resource `GET`s return an **`ETag`** response header identifying the stored
    revision. `PUT` and `DELETE` accept an **optional** `If-Match` request header; when
    present and stale the server MUST respond `412 Precondition Failed`
    (`application/problem+json`). The phase-1 client never sends `If-Match`
    (last-writer-wins); the phase-2 Java service SHOULD fully support it so future
    clients can opt in to optimistic concurrency.

    ## Error model

    All error responses use **RFC 9457 Problem Details**
    (`application/problem+json`): `{ type, title, status, detail, instance? }`.

    Client behavior that servers can rely on (already fixed in
    `RestWorkspaceStorageClient`):

    - `GET` of a single resource treats `404` as "not found" (resolves `undefined`).
    - `DELETE` treats `404` as success (idempotent delete).
    - Every other non-2xx response throws on the client.
    - Any non-`204` success response **must carry a JSON body** — the client
      unconditionally parses `response.json()` on 2xx responses other than 204.

    ## Phase 2 implementation notes (Spring Boot + MongoDB)

    Guidance for the planned Java service (non-normative):

    - **`workspaces` collection** — one document per saved workspace:
      `{ userId, workspaceId, title, snapshot, metadata, version, updatedAt }` with a
      **compound unique index `{ userId: 1, workspaceId: 1 }`**. Store `snapshot` as an
      opaque subdocument (`org.bson.Document` / `Map<String,Object>`) — never bind it to
      typed POJOs. Typical snapshot sizes run **100 KB–2 MB**; that is comfortably under
      MongoDB's **16 MB document cap**, but enforce a request-size limit (e.g. 8 MB) and
      alert on outliers rather than letting documents creep toward the cap.
    - **`pages` collection** — `{ userId, pageId, title, layout, version, updatedAt }`,
      compound unique index `{ userId: 1, pageId: 1 }`; `layout` opaque, same size
      considerations as snapshots.
    - **`dockConfigs` collection** — `{ userId, dockProviderId, config, version,
      updatedAt }`, unique `{ userId: 1, dockProviderId: 1 }`.
    - **`favorites` collection** — one document per user:
      `{ userId, appIds: [string], version, updatedAt }`, unique `{ userId: 1 }`.
      `GET /favorites` returns `{ "appIds": [] }` when the document does not exist —
      never a 404.
    - **`preferences` collection** — `{ userId, key, value, version, updatedAt }`,
      compound unique index `{ userId: 1, key: 1 }`; `value` is any BSON-representable
      JSON value.
    - **`config` collection** — one document per `configName`
      (`{ name, document, version, updatedAt }`, unique `{ name: 1 }`), seeded per
      environment at deploy time; `PUT /config/{configName}` becomes the admin write
      path guarded by a role check.
    - **`dockApps` collection** — one document per LOB dock app
      (`{ dockAppId, document, version, updatedAt }`, unique `{ dockAppId: 1 }`).
      **No `userId` field** — dock apps are shared across users like config, but
      unlike config they are writable through this API (LOB publishing tooling), so
      validate the document shape on PUT as specified on `putDockApp`.
    - **`storeApps` collection** — one document per LOB store app
      (`{ appId, document, version, updatedAt }`, unique `{ appId: 1 }`).
      **No `userId` field** — store apps are shared across users like dock apps and
      likewise writable through this API (LOB publishing tooling), so validate the
      document shape on PUT as specified on `putStoreApp`.
    - **Optimistic concurrency** — a monotonically increasing `version` field
      (`@Version` with Spring Data works) surfaced to HTTP as the `ETag` value
      (e.g. `ETag: "7"`); compare on `If-Match`, respond 412 on mismatch. Upserts bump
      `version` atomically (`findAndModify` / `ReplaceOptions.upsert(true)`).
    - **List endpoints** filter by `userId` only; the workspace `query` filter is a
      case-insensitive substring match on `title` or `workspaceId` (anchor-free regex
      with escaped input, or `$text` if you prefer an index-backed search).
    - Return the stored representation from `PUT` (200/201) — the TypeScript client
      requires a JSON body on non-204 successes.

    ## Changelog

    - **1.2.0** — added the `/store-apps` resource: LOB-published full storefront
      apps (`LobStoreApp`), shared across all users (not user-scoped), merged into
      the app registry at platform load (registry wins on `appId` collisions;
      navigation routes each app by its `category` or tags into the matching
      business-area item — FX, Rates, Commodities, Risk, Spread, Middle Office).
    - **1.1.0** — added the `/dock-apps` resource: LOB-published custom dock apps
      (`LobDockApp`), shared across all users (not user-scoped), read by the platform
      at dock init.
    - **1.0.0** — initial release: workspaces, pages, dock customization, favorites,
      preferences, platform config, health.

externalDocs:
  description: Client contract and reference implementation notes (repo sources)
  url: https://github.com/CapitalMarketsMacro/macro/tree/master/libs/openfin/src/lib/storage

servers:
  - url: 'http://localhost:3000/workspace/v1'
    description: >-
      Local reference implementation — mounted at path prefix /workspace/v1 on the
      market-data-server (apps/market-data-server, port 3000). In-memory, defaults the
      user to 'anonymous' when X-User-Id is absent, returns 501 for PUT /config.
  - url: 'https://workspace-storage-{env}.example.com/workspace/v1'
    description: >-
      Environment-scoped deployments (phase 2, Spring Boot + MongoDB). One deployment
      per environment; the environment is selected by base URL only, never by path.
    variables:
      env:
        description: Deployment environment.
        enum:
          - dev
          - uat
          - prod
        default: dev

security:
  - userId: []

tags:
  - name: Health
    x-displayName: Health
    description: Service liveness. Unauthenticated, not user-scoped.
  - name: Workspaces
    x-displayName: Workspaces
    description: >-
      Saved workspaces — the "List of Workspaces" plus full golden-layout snapshots.
      User-scoped; upsert by workspaceId.
  - name: Pages
    x-displayName: Pages
    description: >-
      Saved pages (browser "Save Page"). User-scoped; upsert by pageId.
  - name: Dock
    x-displayName: Dock
    description: >-
      User dock customization, keyed by dock provider id
      (DockProviderConfigWithIdentity). User-scoped.
  - name: DockApps
    x-displayName: LOB Dock Apps
    description: >-
      Custom dock apps published by lines of business. NOT user-scoped — shared
      across all users of the deployment; no X-User-Id is required (ignored when
      sent). The platform reads them at dock init and renders 'icon' entries as
      dock buttons and 'dropdown' entries as dock folders of child launchers.
  - name: StoreApps
    x-displayName: LOB Store Apps
    description: >-
      Full storefront apps published by lines of business — complete store cards
      with details-page fields (description, screenshots, publisher, support
      contacts). NOT user-scoped — shared across all users of the deployment; no
      X-User-Id is required (ignored when sent). The platform merges them into the
      app registry at load: they surface in the Storefront, Home search and as
      launch targets; registry apps win on appId collisions, and the
      storefront navigation routes each app into the business-area item matching its `category` OR any tag, case-insensitively (FX, Rates, Commodities, Risk, Spread, Middle Office).
  - name: Favorites
    x-displayName: Favorites
    description: >-
      Store favorites — the ordered list of favorited appIds. A per-user singleton
      resource; reading it never 404s.
  - name: Preferences
    x-displayName: Preferences
    description: >-
      Small named JSON preferences (theme preset, view titles, last-saved-workspace
      pointer, …). User-scoped; any JSON value under any key.
  - name: Config
    x-displayName: Config
    description: >-
      Platform configuration documents, per environment (NOT user-scoped). Reads are
      open to all platform clients; writes are a phase-2 admin operation.

paths:
  /health:
    get:
      tags:
        - Health
      operationId: getHealth
      summary: Service health
      description: >-
        Liveness probe. Not user-scoped and requires no authentication. Returns at
        minimum `{ "status": "ok" }`; implementations may add fields (service name,
        uptime, timestamp, backing-store status, …).
      security: []
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /workspaces:
    get:
      tags:
        - Workspaces
      operationId: listWorkspaces
      summary: List saved workspaces
      description: >-
        Returns every saved workspace for the calling user, **including full
        snapshots**. Returns `[]` (never 404) when the user has no saved workspaces.
        The optional `query` parameter applies a case-insensitive substring filter on
        `title` or `workspaceId`.
      parameters:
        - $ref: '#/components/parameters/WorkspaceQuery'
      responses:
        '200':
          description: The user's saved workspaces (possibly empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Workspace'

  /workspaces/{workspaceId}:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      tags:
        - Workspaces
      operationId: getWorkspace
      summary: Get one saved workspace
      description: >-
        Returns the workspace with the given id, including its full snapshot. The
        client resolves `undefined` on 404 (missing workspace is not an error).
      responses:
        '200':
          description: The saved workspace.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Workspaces
      operationId: putWorkspace
      summary: Create or replace a saved workspace
      description: >-
        Full-document upsert keyed by the path id. The request body MUST satisfy
        `body.workspaceId === {workspaceId}` — otherwise the server responds
        `400 Bad Request`. `snapshot` is opaque JSON owned by the OpenFin client; the
        server MUST store and return it byte-faithfully (no key reordering that changes
        semantics, no field stripping). Responds `201` when the workspace did not exist,
        `200` when it was replaced; both carry the stored representation as the body.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Workspace'
      responses:
        '200':
          description: Existing workspace replaced. Body is the stored representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '201':
          description: Workspace created. Body is the stored representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '400':
          $ref: '#/components/responses/BadRequest'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      tags:
        - Workspaces
      operationId: deleteWorkspace
      summary: Delete a saved workspace
      description: >-
        Deletes the workspace. Responds `204` on success and `404` when the id does not
        exist — the client treats 404 as success, making deletes idempotent end-to-end.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Workspace deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /pages:
    get:
      tags:
        - Pages
      operationId: listPages
      summary: List saved pages
      description: >-
        Returns every saved page for the calling user, including full layouts. Returns
        `[]` (never 404) when the user has no saved pages.
      responses:
        '200':
          description: The user's saved pages (possibly empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Page'

  /pages/{pageId}:
    parameters:
      - $ref: '#/components/parameters/PageId'
    get:
      tags:
        - Pages
      operationId: getPage
      summary: Get one saved page
      description: >-
        Returns the page with the given id. The client resolves `undefined` on 404.
      responses:
        '200':
          description: The saved page.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Pages
      operationId: putPage
      summary: Create or replace a saved page
      description: >-
        Full-document upsert keyed by the path id. The request body MUST satisfy
        `body.pageId === {pageId}` — otherwise `400 Bad Request`. `layout` is opaque
        JSON owned by the OpenFin client. Responds `201` on create, `200` on replace;
        both carry the stored representation.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Page'
      responses:
        '200':
          description: Existing page replaced. Body is the stored representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
        '201':
          description: Page created. Body is the stored representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
        '400':
          $ref: '#/components/responses/BadRequest'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      tags:
        - Pages
      operationId: deletePage
      summary: Delete a saved page
      description: >-
        Deletes the page. `204` on success, `404` when absent (client treats 404 as
        success).
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Page deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /dock/{dockProviderId}:
    parameters:
      - $ref: '#/components/parameters/DockProviderId'
    get:
      tags:
        - Dock
      operationId: getDockConfig
      summary: Get the user's dock customization
      description: >-
        Returns the saved dock customization (`DockProviderConfigWithIdentity`) for the
        given dock provider id. `404` when the user has never customized this dock —
        the client resolves `undefined` and the platform falls back to the environment's
        default dock config.
      responses:
        '200':
          description: The saved dock customization.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockConfig'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Dock
      operationId: putDockConfig
      summary: Create or replace the user's dock customization
      description: >-
        Full-document upsert keyed by the path id. The request body MUST satisfy
        `body.id === {dockProviderId}` — otherwise `400 Bad Request`. Everything beyond
        `id` is OpenFin-SDK-owned and MUST be stored opaquely. `201` on create, `200`
        on replace; both carry the stored representation.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DockConfig'
      responses:
        '200':
          description: Existing dock customization replaced. Body is the stored representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockConfig'
        '201':
          description: Dock customization created. Body is the stored representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      tags:
        - Dock
      operationId: deleteDockConfig
      summary: Delete the user's dock customization
      description: >-
        Removes the customization so the platform reverts to the environment default.
        `204` on success, `404` when absent (client treats 404 as success).
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Dock customization deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /dock-apps:
    get:
      tags:
        - DockApps
      operationId: listDockApps
      summary: List LOB dock apps
      description: >-
        Returns every published LOB dock app. NOT user-scoped — the same list is
        returned to every caller and no `X-User-Id` is required (ignored when sent).
        Returns `[]` (never 404) when none are published. Entries are sorted by
        `sortOrder` ascending with entries lacking `sortOrder` last; the sort MUST be
        stable so equal (or absent) `sortOrder` values keep their stored order. The
        platform calls this at dock init and renders `icon` entries as dock buttons
        and `dropdown` entries as dock folders.
      security: []
      responses:
        '200':
          description: All published LOB dock apps (possibly empty), sorted by sortOrder.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LobDockApp'
              examples:
                two-lobs:
                  summary: One icon app (Rates) and one dropdown app (Credit)
                  value:
                    - id: rates-curve-monitor
                      label: Curve Monitor
                      iconUrl: http://localhost:4202/icons/treasury-market-data.svg
                      type: icon
                      url: http://localhost:4201/treasury-market-data
                      tooltip: Live treasury curve monitor
                      lob: Rates
                      sortOrder: 10
                    - id: credit-desk-tools
                      label: Credit Desk
                      iconUrl: http://localhost:4202/icons/openfin.svg
                      type: dropdown
                      tooltip: Credit desk launchers
                      lob: Credit
                      sortOrder: 20
                      children:
                        - id: credit-blotter
                          label: Credit Blotter
                          url: http://localhost:4204/
                        - id: credit-risk-pnl
                          label: Credit Risk / PnL
                          url: http://localhost:4205/
                          iconUrl: http://localhost:4202/icons/react-app.svg

  /dock-apps/{dockAppId}:
    parameters:
      - $ref: '#/components/parameters/DockAppId'
    get:
      tags:
        - DockApps
      operationId: getDockApp
      summary: Get one LOB dock app
      description: >-
        Returns the LOB dock app with the given id. NOT user-scoped; no `X-User-Id`
        required. `404` when no dock app is published under that id.
      security: []
      responses:
        '200':
          description: The published LOB dock app.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LobDockApp'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - DockApps
      operationId: putDockApp
      summary: Publish (create or replace) an LOB dock app
      description: >-
        Full-document upsert keyed by the path id — the write path for LOB publishing
        tooling (Postman/curl/pipelines); the platform itself only reads. NOT
        user-scoped; no `X-User-Id` required (ignored when sent). Unlike the opaque
        workspace/page/dock documents, the body IS validated. The server responds
        `400 Bad Request` (problem+json with a helpful `detail`) when any of the
        following are violated:


        - `id`, `label` and `iconUrl` are required non-empty strings.

        - `type` is required and must be `icon` or `dropdown`.

        - `type: icon` → `url` is required and non-empty.

        - `type: dropdown` → `children` is required and a non-empty array, and every
          child has non-empty `id`, `label` and `url`.

        - Optional fields must carry the schema types when present: `tooltip`, `lob`
          and `children[].iconUrl` non-empty strings; `sortOrder` a finite number.

        - Unknown fields are rejected (`additionalProperties: false`), at the top
          level and inside `children[]`.

        - `body.id` MUST equal the path `{dockAppId}` (existing convention).


        Responds `201` when the dock app did not exist, `200` when it was replaced;
        both carry the stored representation as the body.
      security: []
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LobDockApp'
      responses:
        '200':
          description: Existing dock app replaced. Body is the stored representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LobDockApp'
        '201':
          description: Dock app created. Body is the stored representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LobDockApp'
        '400':
          description: >-
            Validation failed — missing/empty `id`, `label` or `iconUrl`; `type` not
            `icon`/`dropdown`; `type: icon` without a non-empty `url`;
            `type: dropdown` without a non-empty `children` array (or a child missing
            `id`/`label`/`url`); or `body.id` does not match the path id. The
            problem+json `detail` names the offending field.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: about:blank
                title: Bad Request
                status: 400
                detail: "type 'icon' requires a non-empty 'url'."
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      tags:
        - DockApps
      operationId: deleteDockApp
      summary: Unpublish an LOB dock app
      description: >-
        Removes the dock app for ALL users (the resource is shared). NOT user-scoped;
        no `X-User-Id` required. `204` on success, `404` when the id does not exist
        (the client treats 404 as success, making deletes idempotent end-to-end).
      security: []
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Dock app deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /store-apps:
    get:
      tags:
        - StoreApps
      operationId: listStoreApps
      summary: List LOB store apps
      description: >-
        Returns every published LOB store app. NOT user-scoped — the same list is
        returned to every caller and no `X-User-Id` is required (ignored when sent).
        Returns `[]` (never 404) when none are published. Entries are sorted by
        `sortOrder` ascending with entries lacking `sortOrder` last; the sort MUST
        be stable so equal (or absent) `sortOrder` values keep their stored order.
        The platform calls this at load and merges the results into the app
        registry: registry apps win on `appId` collisions, and the
        storefront navigation routes each app into the business-area item matching its `category` OR any tag, case-insensitively (FX, Rates, Commodities, Risk, Spread, Middle Office).
      security: []
      responses:
        '200':
          description: All published LOB store apps (possibly empty), sorted by sortOrder.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LobStoreApp'
              examples:
                two-lobs:
                  summary: A 'view' app with screenshots (Rates) and a 'manifest' platform app (Credit)
                  value:
                    - appId: rates-swap-analytics
                      title: Swap Analytics
                      description: >-
                        Intraday swap curve analytics with DV01 / KR01 breakdowns,
                        published by the Rates line of business.
                      manifest: http://localhost:4202/local/swap-analytics.fin.json
                      manifestType: view
                      icons:
                        - src: http://localhost:4202/icons/treasury-market-data.svg
                      images:
                        - src: http://localhost:4202/screenshots/swap-analytics-grid.png
                        - src: http://localhost:4202/screenshots/swap-analytics-curve.png
                      publisher: Rates Desk Engineering
                      contactEmail: rates-eng@macro.example.com
                      supportEmail: rates-support@macro.example.com
                      tags:
                        - rates
                        - analytics
                      category: Rates
                      lob: Rates
                      sortOrder: 10
                    - appId: credit-workbench
                      title: Credit Workbench
                      description: >-
                        Standalone credit trading platform launched as its own
                        OpenFin platform.
                      manifest: https://credit.macro.example.com/manifest.fin.json
                      manifestType: manifest
                      icons:
                        - src: https://credit.macro.example.com/icons/workbench.svg
                      publisher: Credit Technology
                      lob: Credit
                      sortOrder: 20

  /store-apps/{storeAppId}:
    parameters:
      - $ref: '#/components/parameters/StoreAppId'
    get:
      tags:
        - StoreApps
      operationId: getStoreApp
      summary: Get one LOB store app
      description: >-
        Returns the LOB store app with the given id. NOT user-scoped; no `X-User-Id`
        required. `404` when no store app is published under that id.
      security: []
      responses:
        '200':
          description: The published LOB store app.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LobStoreApp'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - StoreApps
      operationId: putStoreApp
      summary: Publish (create or replace) an LOB store app
      description: >-
        Full-document upsert keyed by the path id — the write path for LOB publishing
        tooling (Postman/curl/pipelines); the platform itself only reads. NOT
        user-scoped; no `X-User-Id` required (ignored when sent). Unlike the opaque
        workspace/page/dock documents, the body IS validated. The server responds
        `400 Bad Request` (problem+json with a helpful `detail`) when any of the
        following are violated:


        - `appId`, `title` and `manifest` are required non-empty strings.

        - `manifestType` is required and must be `view` or `manifest`.

        - `icons` is required and must be a non-empty array of `{ src }` entries,
          each with a non-empty `src` string.

        - Optional fields must carry the schema types when present: `description`,
          `publisher`, `contactEmail`, `supportEmail`, `category` and `lob`
          non-empty strings; `tags` an array of non-empty strings; `images` an
          array of `{ src }` entries each with a non-empty `src` string;
          `sortOrder` a finite number.

        - Unknown fields are rejected (`additionalProperties: false`), at the top
          level and inside `icons[]`/`images[]` entries (only `src` is allowed).

        - `body.appId` MUST equal the path `{storeAppId}` (existing convention).


        Responds `201` when the store app did not exist, `200` when it was replaced;
        both carry the stored representation as the body.
      security: []
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LobStoreApp'
      responses:
        '200':
          description: Existing store app replaced. Body is the stored representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LobStoreApp'
        '201':
          description: Store app created. Body is the stored representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LobStoreApp'
        '400':
          description: >-
            Validation failed — missing/empty `appId`, `title` or `manifest`;
            `manifestType` not `view`/`manifest`; `icons` missing, empty, or
            containing an entry without a non-empty `src`; an optional field of
            the wrong type (`description`/`publisher`/`contactEmail`/
            `supportEmail`/`category`/`lob` not a non-empty string, `tags` not an
            array of non-empty strings, `images` containing an entry without a
            non-empty `src`, `sortOrder` not a finite number); an unknown field at
            the top level or inside an `icons[]`/`images[]` entry; or `body.appId`
            does not match the path id. The problem+json `detail` names the
            offending field.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: about:blank
                title: Bad Request
                status: 400
                detail: "'icons' must be a non-empty array of { src } entries."
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      tags:
        - StoreApps
      operationId: deleteStoreApp
      summary: Unpublish an LOB store app
      description: >-
        Removes the store app for ALL users (the resource is shared). NOT
        user-scoped; no `X-User-Id` required. `204` on success, `404` when the id
        does not exist (the client treats 404 as success, making deletes idempotent
        end-to-end).
      security: []
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Store app deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /favorites:
    get:
      tags:
        - Favorites
      operationId: getFavorites
      summary: Get the user's store favorites
      description: >-
        Returns the ordered list of favorited appIds. This endpoint **never returns
        404** — when the user has never saved favorites it returns
        `{ "appIds": [] }`.
      responses:
        '200':
          description: The user's favorites (possibly empty).
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Favorites'
    put:
      tags:
        - Favorites
      operationId: putFavorites
      summary: Replace the user's store favorites
      description: >-
        Replaces the full ordered list of favorited appIds (the client always writes
        the whole list). Responds `200` with the stored representation. Order is
        significant and MUST be preserved.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Favorites'
      responses:
        '200':
          description: Favorites replaced. Body is the stored representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Favorites'
        '400':
          $ref: '#/components/responses/BadRequest'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /preferences:
    get:
      tags:
        - Preferences
      operationId: listPreferences
      summary: List all preferences
      description: >-
        Returns every stored preference for the calling user as `{ key, value }`
        entries. Returns `[]` (never 404) when none exist. Well-known keys the platform
        itself uses: `last-saved-workspace` (string), `theme-preset` (string),
        `view-titles` (object mapping view name → custom title) — but any key is legal.
      responses:
        '200':
          description: The user's preferences (possibly empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Preference'

  /preferences/{key}:
    parameters:
      - $ref: '#/components/parameters/PreferenceKey'
    get:
      tags:
        - Preferences
      operationId: getPreference
      summary: Get one preference
      description: >-
        Returns the `{ key, value }` pair for the given key. `404` when the key has
        never been set — the client resolves `undefined`.
      responses:
        '200':
          description: The stored preference.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Preferences
      operationId: putPreference
      summary: Create or replace one preference
      description: >-
        Upserts the value under the path key. The request body is a wrapper object
        `{ "value": <any JSON value> }` — the wrapper allows `null` and scalar values
        to round-trip unambiguously. `201` on create, `200` on replace; both carry the
        stored `{ key, value }` representation.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferenceValueWrapper'
      responses:
        '200':
          description: Existing preference replaced. Body is the stored representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'
        '201':
          description: Preference created. Body is the stored representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'
        '400':
          $ref: '#/components/responses/BadRequest'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      tags:
        - Preferences
      operationId: deletePreference
      summary: Delete one preference
      description: >-
        Deletes the preference. `204` on success, `404` when the key was never set
        (client treats 404 as success).
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Preference deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /config/{configName}:
    parameters:
      - $ref: '#/components/parameters/ConfigName'
    get:
      tags:
        - Config
      operationId: getConfig
      summary: Get a platform configuration document
      description: >-
        Returns one of the six platform configuration documents for **this
        environment**. NOT user-scoped — platform config is per-deployment and
        identical for every user, so this route requires no authentication. The
        response shape depends on `configName`; see the per-name examples. `404` when
        the deployment has no document under that name.
      security: []
      responses:
        '200':
          description: The configuration document for this environment.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigDocument'
              examples:
                settings:
                  summary: configName=settings
                  value:
                    platformSettings:
                      id: macro-workspace-platform
                      title: Macro Workspace Starter
                      icon: http://localhost:4202/MacroThemeCondensed/assets/favicon.svg
                    browserSettings:
                      allowDuplicatePageTitles: true
                      indicators:
                        suppressWorkspaceSwitched: false
                        suppressWorkspaceSaved: false
                      tabSearchButton:
                        pageTabs:
                          enabled: true
                        viewTabs:
                          enabled: true
                    storage:
                      defaultEnvironment: local
                      environments:
                        local:
                          mode: localStorage
                          label: Local (this machine)
                        dev:
                          mode: rest
                          baseUrl: http://localhost:3000/workspace/v1
                          label: DEV
                apps:
                  summary: configName=apps
                  value:
                    apps:
                      - appId: macro-angular-fx-market-data
                        name: macro-angular-fx-market-data
                        title: FX Market Data
                        description: Live G10 FX rates grid
                        manifest: http://localhost:4202/local/fx-market-data.fin.json
                        manifestType: view
                        icons:
                          - src: http://localhost:4202/icons/fx-market-data.svg
                        publisher: OpenFin
                        tags:
                          - view
                          - fx
                        category: FX
                dock-config:
                  summary: configName=dock-config
                  value:
                    favorites:
                      - type: item
                        id: fav-macro-angular
                        label: Macro Angular
                        icon: http://localhost:4202/icons/angular-app.svg
                        appId: macro-angular-view
                    contentMenu:
                      - type: folder
                        id: markets
                        label: Markets
                        children:
                          - type: item
                            id: fx-market-data
                            label: FX Market Data
                            icon: http://localhost:4202/icons/fx-market-data.svg
                            appId: macro-angular-fx-market-data
                storefront-config:
                  summary: configName=storefront-config
                  value:
                    navigation:
                      favoritesTitle: Favorites
                      sections:
                        - id: markets
                          title: Markets
                          items:
                            - id: fx
                              title: FX
                              category: FX
                    landingPage:
                      topRow:
                        title: Featured
                        category: FX
                      middleRow:
                        title: Markets
                        category: '*'
                      bottomRow:
                        title: ''
                        appIds: []
                    footer:
                      text: Macro Workspace — Capital Markets
                      links:
                        - title: Support
                          url: mailto:support@macro.example.com
                    cardClickBehavior: perform-primary-button-action
                snap-config:
                  summary: configName=snap-config
                  value:
                    enabled: true
                    serverOptions:
                      showDebug: false
                      disableUserUnstick: false
                      keyToStick: false
                      disableGPUAcceleratedDragging: false
                      disableBlurDropPreview: false
                      autoHideClientTaskbarIcons: true
                entitlements:
                  summary: configName=entitlements
                  value:
                    currentUser:
                      id: u-001
                      name: Macro Trader
