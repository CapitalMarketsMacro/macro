        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Config
      operationId: putConfig
      summary: Replace a platform configuration document (admin, phase 2)
      description: >-
        Replaces the environment's configuration document under `configName`. This is
        a **phase-2 admin operation**: the reference implementation responds
        `501 Not Implemented`. Phase 2 guards it with an admin role on the caller's
        identity token and returns `200` with the stored document. User scoping does
        not apply to the stored data (config is per-environment), but the caller must
        still be authenticated for auditing.
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigDocument'
      responses:
        '200':
          description: Configuration document replaced. Body is the stored representation.
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '501':
          description: >-
            Not implemented — returned by the phase-1 reference implementation, which
            serves config read-only from the deployed static files.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: about:blank
                title: Not Implemented
                status: 501
                detail: PUT /config is a phase-2 admin operation; the reference implementation serves config read-only.

components:
  securitySchemes:
    userId:
      type: apiKey
      in: header
      name: X-User-Id
      description: >-
        Interim user-scoping scheme: the caller's user id as an opaque string. The
        reference implementation defaults to `anonymous` when the header is absent.
        This carries no proof of identity — phase 2 replaces it with OAuth 2.0 / OIDC
        bearer JWTs (`Authorization: Bearer <jwt>`, user id from the `sub` claim), at
        which point this header is ignored or validated against the token. Applied
        globally except `GET /health`, `GET /config/{configName}` and the
        `/dock-apps` and `/store-apps` routes.

  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      description: Workspace id (the `workspaceId` field of the stored document).
      schema:
        type: string
        minLength: 1
      example: b1f6f9a0-3c1d-4e0e-9d2a-7f8c8d1e2f3a
    PageId:
      name: pageId
      in: path
      required: true
      description: Page id (the `pageId` field of the stored document).
      schema:
        type: string
        minLength: 1
      example: page-6a7b8c9d
    DockProviderId:
      name: dockProviderId
      in: path
      required: true
      description: Dock provider id (the `id` field of the stored dock config).
      schema:
        type: string
        minLength: 1
      example: macro-workspace-platform-dock
    DockAppId:
      name: dockAppId
      in: path
      required: true
      description: LOB dock app id (the `id` field of the stored document).
      schema:
        type: string
        minLength: 1
      example: rates-curve-monitor
    StoreAppId:
      name: storeAppId
      in: path
      required: true
      description: LOB store app id (the `appId` field of the stored document).
      schema:
        type: string
        minLength: 1
      example: rates-swap-analytics
    PreferenceKey:
      name: key
      in: path
      required: true
      description: >-
        Preference key. Any non-empty string; well-known platform keys are
        `last-saved-workspace`, `theme-preset` and `view-titles`.
      schema:
        type: string
        minLength: 1
      example: theme-preset
    ConfigName:
      name: configName
      in: path
      required: true
      description: Which platform configuration document to address.
      schema:
        type: string
        enum:
          - settings
          - apps
          - dock-config
          - storefront-config
          - snap-config
          - entitlements
      example: settings
    WorkspaceQuery:
      name: query
      in: query
      required: false
      description: >-
        Optional case-insensitive substring filter applied to each workspace's
        `title` or `workspaceId`. Absent or empty returns all workspaces.
      schema:
        type: string
      example: fx desk
    IfMatch:
      name: If-Match
      in: header
      required: false
      description: >-
        Optional optimistic-concurrency precondition: the ETag previously returned for
        this resource. When present and it does not match the stored revision, the
        server responds `412 Precondition Failed`. The phase-1 client never sends this
        header (last-writer-wins); phase-2 servers SHOULD support it.
      schema:
        type: string
      example: '"7"'

  headers:
    ETag:
      description: >-
        Opaque entity tag identifying the stored revision of this resource (e.g. a
        stringified version counter). Echo it back in `If-Match` to make a subsequent
        PUT/DELETE conditional.
      schema:
        type: string
      example: '"7"'

  responses:
    NotFound:
      description: >-
        Resource not found. For single-resource GETs the client resolves `undefined`;
        for DELETEs the client treats this as success.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Not Found
            status: 404
            detail: No workspace 'b1f6f9a0-3c1d-4e0e-9d2a-7f8c8d1e2f3a' for user 'mrudang'.
    BadRequest:
      description: >-
        Malformed request — most commonly the body's identifier does not match the
        path (e.g. `body.workspaceId !== {workspaceId}`, `body.pageId !== {pageId}`,
        `body.id !== {dockProviderId}`), or the body is not valid JSON.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Bad Request
            status: 400
            detail: body.workspaceId 'ws-2' does not match path workspaceId 'ws-1'.
    PreconditionFailed:
      description: >-
        The `If-Match` header was supplied and does not match the stored revision —
        the resource changed since the caller last read it.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Precondition Failed
            status: 412
            detail: If-Match '"6"' does not match current revision '"7"'.

  schemas:
    ProblemDetail:
      type: object
      description: RFC 9457 Problem Details — the shape of every error response body.
      required:
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the problem type. Defaults to `about:blank`.
          default: about:blank
        title:
          type: string
          description: Short human-readable summary of the problem type.
        status:
          type: integer
          description: The HTTP status code, repeated in the body.
          minimum: 400
          maximum: 599
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri
          description: Optional URI identifying this specific occurrence.
      examples:
        - type: about:blank
          title: Not Found
          status: 404
          detail: No page 'page-6a7b8c9d' for user 'mrudang'.

    HealthStatus:
      type: object
      description: >-
        Health-probe response. Only `status` is guaranteed; implementations may add
        arbitrary diagnostic fields.
      required:
        - status
      properties:
        status:
          type: string
          const: ok
          description: Always `ok` on a 200 response.
      additionalProperties: true
      examples:
        - status: ok
          service: workspace-storage
          uptimeSec: 86123
          time: '2026-07-10T14:03:22.114Z'

    Workspace:
      type: object
      description: >-
        A saved workspace — `Workspace` from `@openfin/workspace-platform`. Beyond the
        two required identity fields, the document (notably `snapshot`) is **opaque
        JSON owned by the OpenFin client**; its shape tracks the Workspace SDK version
        and servers MUST persist and return it verbatim. Typical serialized sizes run
        100 KB–2 MB.
      required:
        - workspaceId
        - title
      properties:
        workspaceId:
          type: string
          minLength: 1
          description: Unique id of the workspace within the user's scope. Must equal the path id on PUT.
        title:
          type: string
          description: Display title shown in the "List of Workspaces".
        snapshot:
          type: object
          description: >-
            Opaque golden-layout snapshot of every window/page/view in the workspace,
            produced by `getCurrentSync().getSnapshot()`. Free-form; do not validate,
            transform, or bind to typed models server-side.
          additionalProperties: true
        metadata:
          description: Optional free-form client metadata attached at save time.
      additionalProperties: true
      examples:
        - workspaceId: b1f6f9a0-3c1d-4e0e-9d2a-7f8c8d1e2f3a
          title: FX Desk Morning
          snapshot:
            windows:
              - defaultWidth: 1280
                defaultHeight: 720
                layout:
                  content:
                    - type: stack
                      content:
                        - type: component
                          componentName: view
                          componentState:
                            url: http://localhost:4200/fx-market-data

    WorkspaceSummary:
      type: object
      description: >-
        Lightweight projection of a Workspace **without** its snapshot (identity +
        metadata only). Not returned by any phase-1 endpoint — `GET /workspaces`
        returns full `Workspace` documents per the client contract — but reserved for
        a future `fields=summary` list projection so phase-2 servers can avoid
        shipping multi-megabyte snapshots when only the picker list is needed.
      required:
        - workspaceId
        - title
      properties:
        workspaceId:
          type: string
          minLength: 1
        title:
          type: string
        metadata:
          description: Optional free-form client metadata attached at save time.
      additionalProperties: true
      examples:
        - workspaceId: b1f6f9a0-3c1d-4e0e-9d2a-7f8c8d1e2f3a
          title: FX Desk Morning

    Page:
      type: object
      description: >-
        A saved page — `Page` from `@openfin/workspace-platform`. Beyond the two
        required identity fields, the document (notably `layout`) is **opaque JSON
        owned by the OpenFin client** and MUST be persisted verbatim.
      required:
        - pageId
        - title
      properties:
        pageId:
          type: string
          minLength: 1
          description: Unique id of the page within the user's scope. Must equal the path id on PUT.
        title:
          type: string
          description: Display title of the page tab.
        layout:
          type: object
          description: >-
            Opaque golden-layout document for the page's views. Free-form; do not
            validate or transform server-side.
          additionalProperties: true
        isReadOnly:
          type: boolean
          description: Whether the page is locked against edits (SDK-owned flag).
      additionalProperties: true
      examples:
        - pageId: page-6a7b8c9d
          title: Treasury Watch
          isReadOnly: false
          layout:
            content:
              - type: row
                content:
                  - type: component
                    componentName: view
                    componentState:
                      url: http://localhost:4201/treasury-market-data

    DockConfig:
      type: object
      description: >-
        A user's saved dock customization — `DockProviderConfigWithIdentity` from
        `@openfin/workspace`. Only `id` is contractual (it keys the resource and must
        equal the path id on PUT); every other field is OpenFin-SDK-owned and MUST be
        stored opaquely (buttons, dropdowns, ordering, workspace/home/store/notification
        toggles, …).
      required:
        - id
      properties:
        id:
          type: string
          minLength: 1
          description: Dock provider id. Must equal the path id on PUT.
      additionalProperties: true
      examples:
        - id: macro-workspace-platform-dock
          buttons:
            - tooltip: FX Market Data
              iconUrl: http://localhost:4202/icons/fx-market-data.svg
              appId: macro-angular-fx-market-data
          workspaceComponents:
            - switchWorkspace

    LobDockApp:
      type: object
      description: >-
        A custom dock app published by a line of business (`LobDockApp` in
        `libs/openfin/src/lib/storage/storage-types.ts`). Shared across all users —
        NOT user-scoped. The platform reads these at dock init and renders
        `type: icon` entries as single dock buttons and `type: dropdown` entries as
        dock folders of child launchers.


        **Conditional requirements** (enforced by the server on PUT; documented here
        rather than modeled as a strict `oneOf` because the discriminated shapes
        differ only in which optional fields become required): when `type` is `icon`,
        `url` is REQUIRED and non-empty; when `type` is `dropdown`, `children` is
        REQUIRED and a non-empty array whose every child has `id`, `label` and `url`.
        See the two examples — one of each type.
      required:
        - id
        - label
        - iconUrl
        - type
      properties:
        id:
          type: string
          minLength: 1
          description: Unique dock app id. Must equal the path id on PUT.
        label:
          type: string
          minLength: 1
          description: Dock button / folder label.
        iconUrl:
          type: string
          format: uri
          minLength: 1
          description: Dock button icon URL (required by contract).
        type:
          type: string
          enum:
            - icon
            - dropdown
          description: >-
            `icon` — a single dock button launching `url`; `dropdown` — a dock
            folder whose entries come from `children`.
        url:
          type: string
          minLength: 1
          format: uri
          description: >-
            URL opened as a platform view when the button is clicked. REQUIRED
            (non-empty) when `type` is `icon`; ignored for `dropdown`.
        children:
          type: array
          minItems: 1
          description: >-
            Child launchers. REQUIRED (non-empty) when `type` is `dropdown`;
            ignored for `icon`.
          items:
            $ref: '#/components/schemas/LobDockAppChild'
        tooltip:
          type: string
          description: >-
            RESERVED — accepted and stored, but not currently rendered: Dock 3.0
            entries have no hover-text field, so the dock shows the label. Kept in
            the contract so publishers won't need a migration when the Dock SDK
            grows tooltip support.
        lob:
          type: string
          description: >-
            Owning line of business, e.g. `Rates` — used for grouping in the
            content menu.
        sortOrder:
          type: number
          description: >-
            Ordering among LOB entries appended to the dock (ascending; entries
            without a sortOrder sort last; ties keep stored order — stable sort).
      additionalProperties: false
      examples:
        - id: rates-curve-monitor
          label: Curve Monitor
          iconUrl: http://localhost:4202/icons/treasury-market-data.svg
          type: icon
          url: http://localhost:4201/treasury-market-data
          tooltip: Live treasury curve monitor
          lob: Rates
          sortOrder: 10
        - id: credit-desk-tools
          label: Credit Desk
          iconUrl: http://localhost:4202/icons/openfin.svg
          type: dropdown
          tooltip: Credit desk launchers
          lob: Credit
          sortOrder: 20
          children:
            - id: credit-blotter
              label: Credit Blotter
              url: http://localhost:4204/
            - id: credit-risk-pnl
              label: Credit Risk / PnL
              url: http://localhost:4205/
              iconUrl: http://localhost:4202/icons/react-app.svg

    LobDockAppChild:
      type: object
      description: >-
        One child launcher inside a `dropdown` LOB dock app (`LobDockAppChild` in
        `libs/openfin/src/lib/storage/storage-types.ts`).
      required:
        - id
        - label
        - url
      properties:
        id:
          type: string
          minLength: 1
          description: Unique id of the child within its parent.
        label:
          type: string
          minLength: 1
          description: Menu entry label.
        url:
          type: string
          minLength: 1
          format: uri
          description: URL opened as a platform view when clicked (required by contract).
        iconUrl:
          type: string
          format: uri
          description: Optional icon (falls back to the parent's `iconUrl`).
      additionalProperties: false
      examples:
        - id: credit-blotter
          label: Credit Blotter
          url: http://localhost:4204/
        - id: credit-risk-pnl
          label: Credit Risk / PnL
          url: http://localhost:4205/
          iconUrl: http://localhost:4202/icons/react-app.svg

    LobStoreApp:
      type: object
      description: >-
        A full store app published by a line of business (`LobStoreApp` in
        `libs/openfin/src/lib/storage/storage-types.ts`). Shared across all users —
        NOT user-scoped. The platform merges these into the app registry at load, so
        they surface in the Storefront (with an app-details page fed by
        `description`, `images` and the support fields), Home search, and as launch
        targets — `manifestType: view` launches the manifest as an embedded view,
        `manifestType: manifest` launches it as another OpenFin platform. Registry
        (apps.json) apps win on `appId` collisions, and the
        storefront navigation routes each app into the business-area item matching its `category` OR any tag, case-insensitively (FX, Rates, Commodities, Risk, Spread, Middle Office).
        The platform also force-adds a `lob` tag as metadata. See the two
        examples — a `view` app with screenshots and a `manifest` platform app.
      required:
        - appId
        - title
        - manifest
        - manifestType
        - icons
      properties:
        appId:
          type: string
          minLength: 1
          description: >-
            Unique app id. Must equal the path id on PUT. Registry apps win on
            collisions.
        title:
          type: string
          minLength: 1
          description: Display title on the store card, app-details page and Home search.
        manifest:
          type: string
          minLength: 1
          format: uri
          description: >-
            Manifest URL — a view manifest (`manifestType: view`) or a platform
            manifest (`manifestType: manifest`).
        manifestType:
          type: string
          enum:
            - view
            - manifest
          description: >-
            `view` — launched as an embedded platform view; `manifest` — launched
            as another OpenFin platform.
        icons:
          type: array
          minItems: 1
          description: Store card icon(s) — at least one required.
          items:
            $ref: '#/components/schemas/Image'
        description:
          type: string
          minLength: 1
          description: Shown on the card and the app-details page.
        images:
          type: array
          description: Screenshots for the app-details page.
          items:
            $ref: '#/components/schemas/Image'
        publisher:
          type: string
          minLength: 1
          description: >-
            Details-page publisher. The platform defaults it to the `lob` value
            when omitted.
        contactEmail:
          type: string
          minLength: 1
          description: Details-page contact email.
        supportEmail:
          type: string
          minLength: 1
          description: Details-page support email.
        tags:
          type: array
          description: >-
            Extra tags (each a non-empty string). Tags route the app into matching
            business-area nav items case-insensitively (e.g. `rates` → the Rates
            item); the platform additionally force-adds a `lob` tag as metadata.
          items:
            type: string
            minLength: 1
        category:
          type: string
          minLength: 1
          description: >-
            Storefront business-area category — routes the app into the matching
            nav item (FX, Rates, Commodities, Risk, Spread, Middle Office).
            Optional: a matching tag works too, and apps with neither still
            appear under All Apps and in Home search.
        lob:
          type: string
          minLength: 1
          description: Owning line of business, e.g. `Rates`.
        sortOrder:
          type: number
          description: >-
            Ordering among LOB store apps (ascending; entries without a sortOrder
            sort last; ties keep stored order — stable sort).
      additionalProperties: false
      examples:
        - appId: rates-swap-analytics
          title: Swap Analytics
          description: >-
            Intraday swap curve analytics with DV01 / KR01 breakdowns, published
            by the Rates line of business.
          manifest: http://localhost:4202/local/swap-analytics.fin.json
          manifestType: view
          icons:
            - src: http://localhost:4202/icons/treasury-market-data.svg
          images:
            - src: http://localhost:4202/screenshots/swap-analytics-grid.png
            - src: http://localhost:4202/screenshots/swap-analytics-curve.png
          publisher: Rates Desk Engineering
          contactEmail: rates-eng@macro.example.com
          supportEmail: rates-support@macro.example.com
          tags:
            - rates
            - analytics
          category: Rates
          lob: Rates
          sortOrder: 10
        - appId: credit-workbench
          title: Credit Workbench
          description: Standalone credit trading platform launched as its own OpenFin platform.
          manifest: https://credit.macro.example.com/manifest.fin.json
          manifestType: manifest
          icons:
            - src: https://credit.macro.example.com/icons/workbench.svg
          publisher: Credit Technology
          lob: Credit
          sortOrder: 20

    Image:
      type: object
      description: >-
        One image reference — a store-card icon or an app-details screenshot. Only
        `src` is allowed; unknown fields inside `icons[]`/`images[]` entries are
        rejected on LOB store app PUTs.
      required:
        - src
      properties:
        src:
          type: string
          minLength: 1
          format: uri
      additionalProperties: false
      examples:
        - src: http://localhost:4202/icons/treasury-market-data.svg
        - src: http://localhost:4202/screenshots/swap-analytics-grid.png

    Favorites:
      type: object
      description: >-
        The user's store favorites as an ordered list of appIds (order is significant
        and preserved). A per-user singleton: GET never 404s and returns
        `{ "appIds": [] }` when nothing was ever saved.
      required:
        - appIds
      properties:
        appIds:
          type: array
          description: Ordered appIds, matching `appId` values in the apps config.
          items:
            type: string
            minLength: 1
      additionalProperties: false
      examples:
        - appIds:
            - macro-angular-fx-market-data
            - macro-react-treasury-market-data

    Preference:
      type: object
      description: One stored preference — a key plus any JSON value.
      required:
        - key
        - value
      properties:
        key:
          type: string
          minLength: 1
          description: >-
            Preference key. Well-known platform keys: `last-saved-workspace` (string
            workspace id restored at startup), `theme-preset` (string preset id),
            `view-titles` (object of view name → custom tab title).
        value:
          description: >-
            Any JSON value — string, number, boolean, null, array or object. Stored
            and returned verbatim.
      additionalProperties: false
      examples:
        - key: theme-preset
          value: macro-dark
        - key: view-titles
          value:
            fx-blotter: FX Blotter (EMEA)

    PreferenceValueWrapper:
      type: object
      description: >-
        Request body of `PUT /preferences/{key}` — the value wrapped in an object so
        `null` and scalar values round-trip unambiguously.
      required:
        - value
      properties:
        value:
          description: Any JSON value to store under the path key.
      additionalProperties: false
      examples:
        - value: macro-dark
        - value:
            fx-blotter: FX Blotter (EMEA)

    ConfigDocument:
      description: >-
        A platform configuration document. The concrete shape is selected by the
        `configName` path parameter — `settings` → SettingsConfig, `apps` →
        AppsConfig, `dock-config` → DockSurfaceConfig, `storefront-config` →
        StorefrontConfig, `snap-config` → SnapConfig, `entitlements` →
        EntitlementsConfig.
      oneOf:
        - $ref: '#/components/schemas/SettingsConfig'
        - $ref: '#/components/schemas/AppsConfig'
        - $ref: '#/components/schemas/DockSurfaceConfig'
        - $ref: '#/components/schemas/StorefrontConfig'
        - $ref: '#/components/schemas/SnapConfig'
        - $ref: '#/components/schemas/EntitlementsConfig'

    SettingsConfig:
      type: object
      description: >-
        `configName=settings` — platform identity, optional Workspace v24 browser
        options, and the storage-environment declarations (mirrors
        `apps/macro-workspace/public/{env}/settings.json` / `SettingsResponse` in
        `libs/openfin/src/lib/types.ts`).
      required:
        - platformSettings
      properties:
        platformSettings:
          $ref: '#/components/schemas/PlatformSettings'
        browserSettings:
          $ref: '#/components/schemas/BrowserSettings'
        storage:
          $ref: '#/components/schemas/StorageSettings'
      additionalProperties: true
      examples:
        - platformSettings:
            id: macro-workspace-platform
            title: Macro Workspace Starter
            icon: http://localhost:4202/MacroThemeCondensed/assets/favicon.svg
          browserSettings:
            allowDuplicatePageTitles: true
            indicators:
              suppressWorkspaceSwitched: false
              suppressWorkspaceSaved: false
            tabSearchButton:
              pageTabs:
                enabled: true
              viewTabs:
                enabled: true
          storage:
            defaultEnvironment: local
            environments:
              local:
                mode: localStorage
              uat:
                mode: rest
                baseUrl: https://workspace-storage-uat.example.com/workspace/v1
                label: UAT

    PlatformSettings:
      type: object
      description: OpenFin platform identity (settings.json → `platformSettings`).
      required:
        - id
        - title
        - icon
      properties:
        id:
          type: string
          description: Platform UUID/id used by the OpenFin runtime.
        title:
          type: string
          description: Platform display title.
        icon:
          type: string
          format: uri
          description: Platform icon URL.
      additionalProperties: false
      examples:
        - id: macro-workspace-platform
          title: Macro Workspace Starter
          icon: http://localhost:4202/MacroThemeCondensed/assets/favicon.svg

    BrowserSettings:
      type: object
      description: >-
        Optional Workspace v24 browser options (settings.json → `browserSettings`).
        Field names mirror the SDK's `BrowserInitConfig`; absent fields fall back to
        code defaults.
      properties:
        allowDuplicatePageTitles:
          type: boolean
          description: Allow multiple pages to share a title (no forced numeric suffixes).
        indicators:
          type: object
          description: Suppress the green success indicators.
          properties:
            suppressWorkspaceSwitched:
              type: boolean
            suppressWorkspaceSaved:
              type: boolean
          additionalProperties: false
        tabSearchButton:
          type: object
          description: Searchable tab dropdown (chevron) per tab strip.
          properties:
            pageTabs:
              type: object
              properties:
                enabled:
                  type: boolean
              required:
                - enabled
              additionalProperties: false
            viewTabs:
              type: object
              properties:
                enabled:
                  type: boolean
              required:
                - enabled
              additionalProperties: false
          additionalProperties: false
      additionalProperties: true
      examples:
        - allowDuplicatePageTitles: true
          tabSearchButton:
            pageTabs:
              enabled: true
            viewTabs:
              enabled: true

    StorageSettings:
      type: object
      description: >-
        The `storage` block of settings.json — declares the selectable storage
        environments and which one the platform boots with. Runtime precedence for
        the active environment: `?storageEnv=` query param → user's saved choice →
        `defaultEnvironment` → `local`.
      properties:
        defaultEnvironment:
          type: string
          description: Name of the environment the platform boots with.
        environments:
          type: object
          description: Environment name → environment config.
          additionalProperties:
            $ref: '#/components/schemas/StorageEnvironment'
      additionalProperties: false
      examples:
        - defaultEnvironment: local
          environments:
            local:
              mode: localStorage
            prod:
              mode: rest
              baseUrl: https://workspace-storage-prod.example.com/workspace/v1
              label: Production

    StorageEnvironment:
      type: object
      description: One selectable storage environment.
      required:
        - mode
      properties:
        mode:
          type: string
          enum:
            - localStorage
            - rest
          description: How this environment persists data.
        baseUrl:
          type: string
          format: uri
          description: Service base URL. Required when `mode` is `rest`.
        label:
          type: string
          description: Display label for pickers (defaults to the environment name).
      additionalProperties: false
      examples:
        - mode: rest
          baseUrl: https://workspace-storage-uat.example.com/workspace/v1
          label: UAT

    AppsConfig:
      type: object
      description: >-
        `configName=apps` — the app registry (mirrors
        `apps/macro-workspace/public/{env}/apps.json`), the source of truth for
        store, dock and home.
      required:
        - apps
      properties:
        apps:
          type: array
          items:
            $ref: '#/components/schemas/App'
      additionalProperties: false
      examples:
        - apps:
            - appId: macro-workspace-view1
              name: macro-workspace-view1
              title: Macro Workspace View 1
              description: Broadcast contexts and notifications from View 1
              manifest: http://localhost:4202/local/view1.fin.json
              manifestType: view
              icons:
                - src: http://localhost:4202/icons/view-broadcaster.svg
              publisher: OpenFin
              tags:
                - view
                - openfin
              category: Workspace

    App:
      type: object
      description: >-
        One registry entry — an OpenFin `App` plus the enterprise `category` field
        that drives storefront navigation (`MacroApp` in
        `libs/openfin/src/lib/types.ts`).
      required:
        - appId
        - name
        - title
        - manifest
        - manifestType
      properties:
        appId:
          type: string
          description: Unique app id — the value referenced by favorites, dock and entitlements.
        name:
          type: string
        title:
          type: string
          description: Display title in store, home and dock.
        description:
          type: string
        manifest:
          type: string
          format: uri
          description: URL of the app's (view) manifest.
        manifestType:
          type: string
          description: Manifest type; this platform registers `view` manifests.
        icons:
          type: array
          items:
            $ref: '#/components/schemas/AppIcon'
        contactEmail:
          type: string
        supportEmail:
          type: string
        publisher:
          type: string
        intents:
          type: array
          items:
            type: object
            additionalProperties: true
        images:
          type: array
          items:
            type: object
            additionalProperties: true
        tags:
          type: array
          items:
            type: string
        category:
          type: string
          description: Business-area key (FX, Rates, Risk, …) matched by storefront navigation.
      additionalProperties: true
      examples:
        - appId: macro-angular-fx-market-data
          name: macro-angular-fx-market-data
          title: FX Market Data
          description: Live G10 FX rates grid
          manifest: http://localhost:4202/local/fx-market-data.fin.json
          manifestType: view
          icons:
            - src: http://localhost:4202/icons/fx-market-data.svg
          publisher: OpenFin
          tags:
            - view
            - fx
          category: FX

    AppIcon:
      type: object
      description: One app icon reference.
      required:
        - src
      properties:
        src:
          type: string
          format: uri
      additionalProperties: false
      examples:
        - src: http://localhost:4202/icons/fx-market-data.svg

    DockSurfaceConfig:
      type: object
      description: >-
        `configName=dock-config` — the environment's **default** dock surface
        (mirrors `apps/macro-workspace/public/{env}/dock-config.json` /
        `Dock3Settings`): pinned favorites plus the content-menu folder tree. Distinct
        from the user-scoped `/dock/{dockProviderId}` resource, which stores a user's
        personal customization on top of this default.
      properties:
        favorites:
          type: array
          items:
            $ref: '#/components/schemas/DockFavoriteEntry'
        contentMenu:
          type: array
          items:
            $ref: '#/components/schemas/DockContentEntry'
      additionalProperties: false
      examples:
        - favorites:
            - type: item
              id: fav-macro-angular
              label: Macro Angular
              icon: http://localhost:4202/icons/angular-app.svg
              appId: macro-angular-view
          contentMenu:
            - type: folder
              id: markets
              label: Markets
              children:
                - type: item
                  id: fx-market-data
                  label: FX Market Data
                  icon: http://localhost:4202/icons/fx-market-data.svg
                  appId: macro-angular-fx-market-data

    DockFavoriteEntry:
      type: object
      description: One pinned dock favorite.
      required:
        - type
        - id
        - icon
        - label
      properties:
        type:
          type: string
          const: item
        id:
          type: string
        icon:
          type: string
          format: uri
        label:
          type: string
        appId:
          type: string
          description: The registry app launched on click.
      additionalProperties: false
      examples:
        - type: item
          id: fav-fx-market-data
          label: FX Market Data
          icon: http://localhost:4202/icons/fx-market-data.svg
          appId: macro-angular-fx-market-data

    DockContentEntry:
      description: A content-menu node — either a launchable item or a folder of nested entries.
      oneOf:
        - $ref: '#/components/schemas/DockContentItem'
        - $ref: '#/components/schemas/DockContentFolder'
      discriminator:
        propertyName: type
        mapping:
          item: '#/components/schemas/DockContentItem'
          folder: '#/components/schemas/DockContentFolder'

    DockContentItem:
      type: object
      description: A launchable content-menu leaf.
      required:
        - type
        - id
        - icon
        - label
      properties:
        type:
          type: string
          const: item
        id:
          type: string
        icon:
          type: string
          format: uri
        label:
          type: string
        appId:
          type: string
      additionalProperties: false
      examples:
        - type: item
          id: treasury-market-data
          label: Treasury Market Data
          icon: http://localhost:4202/icons/treasury-market-data.svg
          appId: macro-react-treasury-market-data

    DockContentFolder:
      type: object
      description: A content-menu folder containing nested entries.
      required:
        - type
        - id
        - label
        - children
      properties:
        type:
          type: string
          const: folder
        id:
          type: string
        label:
          type: string
        children:
          type: array
          items:
            $ref: '#/components/schemas/DockContentEntry'
      additionalProperties: false
      examples:
        - type: folder
          id: markets
          label: Markets
          children:
            - type: item
              id: fx-market-data
              label: FX Market Data
              icon: http://localhost:4202/icons/fx-market-data.svg
              appId: macro-angular-fx-market-data

    StorefrontConfig:
      type: object
      description: >-
        `configName=storefront-config` — storefront navigation sections, landing page
        rows and footer (mirrors
        `apps/macro-workspace/public/{env}/storefront-config.json` /
        `StorefrontConfig` in `libs/openfin/src/lib/types.ts`). OpenFin caps
        navigation at 3 sections × 5 items, and the dynamic Favorites section
        occupies one section slot.
      required:
        - navigation
      properties:
        navigation:
          type: object
          required:
            - sections
          properties:
            favoritesTitle:
              type: string
              description: Title for the auto-managed dynamic Favorites section.
            sections:
              type: array
              items:
                $ref: '#/components/schemas/StorefrontNavSection'
          additionalProperties: false
        landingPage:
          type: object
          properties:
            hero:
              type: object
              required:
                - title
                - description
              properties:
                title:
                  type: string
                description:
                  type: string
                image:
                  type: object
                  required:
                    - src
                  properties:
                    src:
                      type: string
                      format: uri
                    size:
                      type: string
                  additionalProperties: false
              additionalProperties: false
            topRow:
              $ref: '#/components/schemas/StorefrontRow'
            middleRow:
              $ref: '#/components/schemas/StorefrontRow'
            bottomRow:
              $ref: '#/components/schemas/StorefrontRow'
          additionalProperties: false
        footer:
          type: object
          properties:
            logo:
              type: object
              required:
                - src
              properties:
                src:
                  type: string
                  format: uri
                size:
                  type: string
              additionalProperties: false
            text:
              type: string
            links:
              type: array
              items:
                $ref: '#/components/schemas/StorefrontLink'
          additionalProperties: false
        cardClickBehavior:
          type: string
          enum:
            - show-app-details
            - perform-primary-button-action
      additionalProperties: false
      examples:
        - navigation:
            favoritesTitle: Favorites
            sections:
              - id: markets
                title: Markets
                items:
                  - id: fx
                    title: FX
                    category: FX
                  - id: rates
                    title: Rates
                    category: Rates
              - id: library
                title: All Apps
                items:
                  - id: all-apps
                    title: All Apps
                    category: '*'
          landingPage:
            topRow:
              title: Featured
              category: FX
            middleRow:
              title: Markets
              category: '*'
            bottomRow:
              title: ''
              appIds: []
          footer:
            text: Macro Workspace — Capital Markets
            links:
              - title: Support
                url: mailto:support@macro.example.com
              - title: Documentation
                url: https://macro.example.com/docs
          cardClickBehavior: perform-primary-button-action

    StorefrontNavSection:
      type: object
      description: One storefront navigation section (max 5 items).
      required:
        - id
        - title
        - items
      properties:
        id:
          type: string
        title:
          type: string
        items:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/StorefrontNavItem'
      additionalProperties: false
      examples:
        - id: markets
          title: Markets
          items:
            - id: fx
              title: FX
              category: FX

    StorefrontNavItem:
      type: object
      description: >-
        One navigation item — a business area rendered as an app grid (apps filtered
        by `category`; `'*'` = all apps).
      required:
        - id
        - title
        - category
      properties:
        id:
          type: string
        title:
          type: string
        category:
          type: string
          description: Business-area key matched against each app's `category`; `'*'` matches all.
      additionalProperties: false
      examples:
        - id: risk
          title: Risk
          category: Risk

    StorefrontRow:
      type: object
      description: >-
        A landing-page row sourced either by explicit `appIds` or by `category`
        (`'*'` = all apps).
      required:
        - title
      properties:
        title:
          type: string
        appIds:
          type: array
          items:
            type: string
        category:
          type: string
      additionalProperties: false
      examples:
        - title: Featured
          category: FX

    StorefrontLink:
      type: object
      description: One footer link.
      required:
        - title
        - url
      properties:
        title:
          type: string
        url:
          type: string
          format: uri
      additionalProperties: false
      examples:
        - title: Support
          url: mailto:support@macro.example.com

    SnapConfig:
      type: object
      description: >-
        `configName=snap-config` — OpenFin Snap server options (mirrors
        `apps/macro-workspace/public/{env}/snap-config.json` /
        `SnapProviderSettings`).
      properties:
        enabled:
          type: boolean
        serverOptions:
          type: object
          properties:
            showDebug:
              type: boolean
            disableUserUnstick:
              type: boolean
            keyToStick:
              description: '`false` to disable, or the modifier key required to stick.'
              oneOf:
                - type: boolean
                - type: string
                  enum:
                    - ctrl
                    - shift
            disableGPUAcceleratedDragging:
              type: boolean
            disableBlurDropPreview:
              type: boolean
            autoHideClientTaskbarIcons:
              type: boolean
            theme:
              type: string
              enum:
                - snap-original
                - snap-light1
                - snap-dark1
          additionalProperties: false
      additionalProperties: false
      examples:
        - enabled: true
          serverOptions:
            showDebug: false
            disableUserUnstick: false
            keyToStick: false
            disableGPUAcceleratedDragging: false
            disableBlurDropPreview: false
            autoHideClientTaskbarIcons: true

    EntitlementsConfig:
      type: object
      description: >-
        `configName=entitlements` — the mock/config-driven user identity plus the
        appId → required-entitlements map (mirrors
        `apps/macro-workspace/public/{env}/entitlements.json` /
        `EntitlementsConfig`). A missing/empty entry means the app is launchable by
        everyone; entitlement matching is any-of.
      required:
        - currentUser
        - apps
      properties:
        currentUser:
          $ref: '#/components/schemas/EntitledUser'
        apps:
          type: object
          description: appId → required entitlement keys (any-of).
          additionalProperties:
            type: array
            items:
              type: string
      additionalProperties: false
      examples:
        - currentUser:
            id: u-001
            name: Macro Trader
            groups:
              - fx-desk
              - rates-desk
            entitlements:
              - fx-trader
              - rates-trader
              - general-user
          apps:
            macro-angular-fx-market-data:
              - fx-trader
            macro-react-treasury-market-data:
              - rates-trader

    EntitledUser:
      type: object
      description: Authenticated user identity (mock/config-driven; swapped for a real IdP in phase 2).
      required:
        - id
        - name
        - entitlements
      properties:
        id:
          type: string
        name:
          type: string
        groups:
          type: array
          items:
            type: string
        entitlements:
          type: array
          description: Entitlement keys the user holds; matched against each app's requirements.
          items:
            type: string
      additionalProperties: false
      examples:
        - id: u-001
          name: Macro Trader
          groups:
            - fx-desk
          entitlements:
            - fx-trader
            - general-user
