# NATS config for the Prism broker lab: core pub/sub + JetStream + a WebSocket
# listener (browsers/OpenFin can only reach NATS over WebSocket).

# Client (TCP) listener
port: 4222

# Monitoring endpoint -> http://localhost:8222
http_port: 8222

# JetStream (durable streams for the snapshot-capable NATS source)
jetstream {
  store_dir: /data
  max_memory_store: 256MB
  max_file_store: 1GB
}

# WebSocket listener — Prism's NATS / JetStream sources connect to ws://localhost:9222
websocket {
  port: 9222
  no_tls: true
}
